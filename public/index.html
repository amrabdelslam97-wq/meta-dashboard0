// ─── Phase 4: Freshness bar ──────────────────────────────────
function updateFreshnessBar(insights) {
  const bar  = document.getElementById('freshness-bar');
  const text = document.getElementById('freshness-text');
  if (!bar || !text) return;

  const df = insights?.data_freshness || {};
  const fetchedAt = df.fetched_at || insights?.fetched_at;
  if (!fetchedAt) { bar.style.display = 'none'; return; }

  const dt = new Date(fetchedAt);
  const isMock = insights?.is_mock;
  const incomplete = df.data_may_be_incomplete;

  const sourceLabel = isMock
    ? '<span class="source-badge mock">mock</span>'
    : df.from_cache
      ? '<span class="source-badge cached">cached</span>'
      : '<span class="source-badge live">live</span>';

  bar.style.display = '';
  bar.className = 'freshness-bar' + (incomplete ? ' warn' : '');

  text.innerHTML = `Data as of ${dt.toLocaleString()} ${sourceLabel}`
    + (incomplete ? ' · <span class="text-orange">⚠ Conversion data may be incomplete (within attribution window)</span>' : '');
}

// ─── Phase 4: Delta indicator helper ─────────────────────────
function deltaHtml(deltas, metric, lowerIsBetter = false) {
  const d = deltas?.[metric];
  if (!d || d.delta_pct === undefined) return '';
  const pct = d.delta_pct;
  const isGood = lowerIsBetter ? pct < 0 : pct > 0;
  const isBad  = lowerIsBetter ? pct > 0 : pct < 0;
  const cls    = isGood ? 'pos' : isBad ? 'neg' : 'neu';
  const arrow  = pct > 0 ? '▲' : pct < 0 ? '▼' : '▸';
  return `<span class="delta ${cls}">${arrow} ${Math.abs(pct)}%</span>`;
}

// ─── Phase 4: Trend chart from real API ──────────────────────
async function loadTrendChartReal(campaignId, since, until) {
  const el = document.getElementById('history-chart-wrap');
  if (!el) return;
  try {
    const r = await api(addDateQ(insightsUrl(`/campaigns/${campaignId}/insights/trend`)));
    const data = r.data || [];
    if (!data.length) { el.innerHTML = '<div class="empty">No trend data for this period.</div>'; return; }

    // Show metric selector
    const metrics = ['spend','ctr','cpm','cpc','frequency'];
    let selectedMetric = 'ctr';

    function renderTrendBars(metric) {
      const values = data.map(d => parseFloat(d[metric]) || 0);
      const max = Math.max(...values, 0.001);
      const bars = data.map((d, i) => {
        const h = Math.round((values[i] / max) * 80);
        const lbl = d.date_start ? d.date_start.slice(5) : i;
        return `<div class="bar-wrap" title="${d.date_start}: ${values[i].toFixed(2)}">
          <div class="bar" style="height:${h}px;background:var(--accent)"></div>
          <div class="bar-label">${lbl}</div>
        </div>`;
      }).join('');

      const avg = values.length ? (values.reduce((a,b)=>a+b,0)/values.length).toFixed(2) : '—';
      const min = Math.min(...values).toFixed(2);
      const max2 = Math.max(...values).toFixed(2);

      return `<div class="chart-bars">${bars}</div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--muted)">Min: ${min}</span>

          <span style="font-size:11px;color:var(--muted)">${data.length} days</span>
        </div>`;
    }

    el.innerHTML = `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div class="section-title">📈 Daily Trend</div>
        <div class="tabs-inner" id="trend-metric-tabs">
          ${metrics.map(m => `<div class="tab-inner${m===selectedMetric?' active':''}" onclick="switchTrendMetric('${m}',this)">${m.toUpperCase()}</div>`).join('')}
        </div>
      </div>
      <div class="chart-wrap" id="trend-bars">${renderTrendBars(selectedMetric)}</div>
    </div>`;

    window._trendData = data;
    window.switchTrendMetric = function(metric, el) {
      document.querySelectorAll('#trend-metric-tabs .tab-inner').forEach(t=>t.classList.remove('active'));

    el.innerHTML = '<div class="empty">Could not load trend data.</div>';
  }
}

// ─── Phase 4: Breakdown charts ───────────────────────────────
async function loadBreakdownCharts(campaignId) {
  const el = document.getElementById('tab-breakdowns');
  if (!el) return;
  el.innerHTML = '<div class="loader"><span class="spin">◌</span> Loading breakdowns...</div>';

  try {
    const r = await api(addDateQ(insightsUrl(`/campaigns/${campaignId}/insights/breakdowns`)));

    function breakdownSection(title, rows, valueKey = 'spend') {
      if (!rows?.length) return `<div class="empty">${title}: No data</div>`;
      return `<div class="card" style="margin-bottom:12px">
        <div class="section-title" style="margin-bottom:12px">${title}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:11px;color:var(--muted)">Sorted by spend</span>
        </div>
        ${rows.slice(0,8).map(row => {
          const pct = row.spend_pct || 0;
          return `<div class="breakdown-bar-row">
            <div class="breakdown-bar-label">${row.dimension_value}</div>
            <div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
            <div class="breakdown-bar-val">${pct}% · ${(row.spend||0).toFixed(0)} EGP</div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;padding-left:98px">
            CTR: ${(row.ctr||0).toFixed(2)}% · CPM: ${(row.cpm||0).toFixed(2)} · Freq: ${(row.frequency||0).toFixed(2)}
          </div>`;
        }).join('')}
      </div>`;
    }

    el.innerHTML = `
      ${breakdownSection('👥 Age Breakdown', r.age?.data)}
      ${breakdownSection('⚧ Gender Breakdown', r.gender?.data)}
      ${breakdownSection('📍 Region Breakdown', r.region?.data)}
      <div class="text-muted" style="font-size:11px;margin-top:8px">Fetched: ${r.fetched_at || new Date().toISOString()}</div>
    `;
  } catch(e) {
    el.innerHTML = '<div class="empty">Could not load breakdown data: ' + e.message + '</div>';
  }
}

function renderDecisionCards(decisions) {
  if (!decisions.length) return '<div class="empty">✓ No decisions pending. Run campaign analysis to generate insights.</div>';
  return decisions.map(d => `
  <div class="decision-card ${d.priority}" id="dec-${d.id}">
    <div class="decision-header">
      <div>
        <div class="decision-label">${d.decision_label || d.decision_type}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;cursor:pointer;color:var(--accent2)" onclick="viewCampaign('${d.meta_campaign_id}')">${d.campaign_name}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="badge ${d.priority}">${d.priority}</span>
        ${d.health_score !== null ? scoreCircle(d.health_score, true) : ''}
      </div>
    </div>
    <div class="decision-reason">${d.reason}</div>
    ${d.rule_id ? `
    <div style="font-size:10px;color:var(--muted);margin:2px 0">
      <span class="chip" style="background:var(--bg3);color:var(--accent2)">${d.framework}</span>
      Rule ${d.rule_id}
      ${d.governance_state ? icGovernanceStateBadge(d.governance_state) : ''}
    </div>` : ''}
    <div class="decision-action">→ ${d.suggested_action}</div>
    ${Object.keys(d.supporting_metrics||{}).length ? `
    <div class="decision-metrics">
      ${Object.entries(d.supporting_metrics).slice(0,4).map(([k,v]) =>
        v !== null && v !== undefined ? `<span class="decision-metric">${k}: ${typeof v==='number'?v.toFixed(2):v}</span>` : ''
      ).join('')}
    </div>` : ''}
    <div class="decision-actions">
      <button class="btn btn-success btn-sm" onclick="completeDecision('${d.id}','${d.decision_type}','${(d.campaign_name||'').replace(/'/g,"\'")}')">✓ Done</button>
      <button class="btn btn-ghost btn-sm"   onclick="dismissDecision('${d.id}')">Dismiss</button>
      ${d.expected_impact ? `<span class="text-muted" style="font-size:11px;margin-left:4px;align-self:center">Expected Impact: ${d.expected_impact}</span>` : ''}
    </div>
  </div>`).join('');
}

function filterDecisions(priority) {
  const all = window._allDecisions || [];
  const filtered = priority ? all.filter(d => d.priority === priority) : all;
  document.getElementById('decisions-list').innerHTML = renderDecisionCards(filtered);
}

function filterDecisionsByObjective(objective) {
  const all = window._allDecisions || [];
  const filtered = objective ? all.filter(d => d.objective === objective) : all;
  document.getElementById('decisions-list').innerHTML = renderDecisionCards(filtered);
}

async function completeDecision(id, type, name) {
  openModal(`

async function saveDecisionComplete(id) {
  const notes = document.getElementById('dec-note')?.value || '';
  try {
    await apiPatch('/decisions/history/' + id, { status: 'completed', action_notes: notes, action_taken: true });
  } catch {}
  closeModal();
  loadDecisions();
}

async function dismissDecision(id) {
  try { await apiPatch('/decisions/history/' + id, { status: 'dismissed' }); } catch {}
  loadDecisions();
}

async function changeReportPeriod() {

}

async function changeReportObjective() {
  window._reportObjective = document.getElementById('report-objective')?.value || '';
  loadReports();
}

function exportReport(format) {
  const period    = window._reportPeriod    || 'weekly';
  const objective = window._reportObjective || '';
  const objQ = objective ? '&objective=' + objective : '';
  const url = `/api/v1/reports/export?format=${format}&period=${period}${objQ}`;
  if (format === 'pdf') {
    window.open(url, '_blank');
  } else {
    const a = document.createElement('a');
    a.href = url;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

// backend) -- no new API call, no new endpoint, just rendering what the

function ciAdvisorStatusBadgeClass(status) {
  return { Scale: 'excellent', Pause: 'critical', Refresh: 'warning', Rewrite: 'warning', 'Leave Unchanged': 'good', Monitor: 'info' }[status] || 'none';
}
function ciPriorityBadgeClass(p) {
  return p === 'HIGH' ? 'critical' : p === 'MEDIUM' ? 'warning' : p === 'LOW' ? 'good' : 'none';
}
function ciRiskBadgeClass(level) {
  // Dashboard Normalization (Phase 46) -- normalized to uppercase before
  // comparing: panel.business_risk is already 'HIGH'/'MEDIUM'/'LOW', but
  // advisorEngine.buildRiskAssessment()'s per-dimension levels are Title
  // Case ('High'/'Medium'/'Low') -- without normalizing, every risk-
  // assessment badge silently fell through to the neutral 'none' class.
  const norm = String(level || '').toUpperCase();
  return norm === 'HIGH' ? 'critical' : norm === 'MEDIUM' ? 'warning' : norm === 'LOW' ? 'excellent' : 'none';
}

function ciRenderAdvisorPanel(panel) {
  if (!panel) return '';
  return `

function ciRenderBusinessImpact(bi) {
  if (!bi) return '';
  const parts = [];
  if (bi.reach_increase?.range) parts.push(`Reach ${bi.reach_increase.range} (${bi.reach_increase.probability})`);
  if (bi.cpa_change?.range) parts.push(`CPA ${bi.cpa_change.range} (${bi.cpa_change.probability})`);
  if (bi.ctr_improvement?.range) parts.push(`CTR ${bi.ctr_improvement.range} (${bi.ctr_improvement.probability})`);
  if (!parts.length) return '';
  return `<div style="font-size:11px;color:var(--muted);margin-top:6px">Expected impact — ${parts.join(' · ')}</div>`;
}

// Phase 45 (Task 11) -- Business Impact Ranking: 5 named categories + one
// overall label, reshaped from the same per-action business_impact/
// risk_assessment fields ciRenderBusinessImpact/ciRenderRiskAssessment
// already render individually -- this adds the ranked "Overall Business
// Impact" summary those two don't provide on their own.
function ciRenderBusinessImpactRanking(ranking) {
  if (!ranking) return '';
  const dims = [
    ['Revenue', ranking.revenue_impact], ['Reach', ranking.reach_impact], ['CPA', ranking.cpa_impact],
    ['CTR', ranking.ctr_impact], ['Learning', ranking.learning_impact],
  ].filter(([, v]) => v && v.level && v.level !== 'Not applicable');
  if (!dims.length) return '';
  const overallCls = { Highest: 'excellent', High: 'good', Medium: 'warning', Low: 'info' }[ranking.overall_business_impact] || 'none';
  return `<div style="margin-top:8px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span class="badge ${overallCls}">Overall Business Impact: ${ranking.overall_business_impact}</span>
      ${dims.map(([label, v]) => `<span class="badge none" title="${v.reason || ''}">${label}: ${v.level}${v.range ? ' ' + v.range : ''}</span>`).join('')}
    </div>
  </div>`;
}

function ciRenderRiskAssessment(ra) {
  if (!ra) return '';
  const dims = [
    ['Implementation', ra.implementation_risk], ['Learning phase', ra.learning_phase_risk],
    ['Audience fatigue', ra.audience_fatigue_risk], ['Budget', ra.budget_risk], ['Volatility', ra.performance_volatility],
  ].filter(([, v]) => v);
  if (!dims.length) return '';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
    ${dims.map(([label, v]) => `<span class="badge ${ciRiskBadgeClass(v.level)}" title="${v.reason}">${label}: ${v.level}</span>`).join('')}
  </div>`;
}

// Dashboard Normalization (Phase 46) -- avoid re-showing a fact already
// stated in the Advisor Panel's "Reason" bullets directly above this card
// (Goal 2: show each fact once, never a repeated paragraph). Exact-match
// plus the one known paraphrase pattern this codebase's own audit found
// (advisorEngine.js's buildActionEvidence() vs buildAdvisorPanel()
// independently wording the same benchmark-outperformance fact) -- never a
// generic fuzzy matcher, so this can't accidentally hide a genuinely new point.
function ciBulletAlreadyShown(bullet, shownBullets) {
  const norm = s => (s || '').trim().toLowerCase();
  if ((shownBullets || []).some(s => norm(s) === norm(bullet))) return true;
  const outperformPattern = /outperforming its .*(peers|average)/i;
  if (outperformPattern.test(bullet) && (shownBullets || []).some(s => outperformPattern.test(s))) return true;
  return false;
}

function ciRenderPriorities(priorities, fallbackRecommendations, panelReason) {
  const shownBullets = panelReason || [];
  if (priorities && priorities.length) {
    return priorities.map(p => {
      const pcls = p.priority === 1 ? 'critical' : p.priority === 2 ? 'warning' : 'info';
      const evidence = (p.evidence_used || []).filter(e => !ciBulletAlreadyShown(e, shownBullets));
      return `
      <div class="rec-card ${pcls}" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
          <strong style="font-size:13px">${p.action}</strong>
          <span class="badge ${pcls}">${p.tier || p.priority_label}</span>
        </div>
        ${p.problem ? `<div style="font-size:11px;color:var(--muted);margin-bottom:4px"><strong>Problem:</strong> ${p.problem}</div>` : ''}
        <div class="rec-body">${p.why}</div>
        ${evidence.length ? `<div style="font-size:12px;margin-bottom:8px"><strong>Evidence</strong>${evidence.map(e => `<div>• ${e}</div>`).join('')}</div>` : ''}
        <div class="rec-meta" style="margin-bottom:4px">
          <span style="font-size:11px;color:var(--muted)">Confidence: <strong>${p.confidence_pct != null ? p.confidence_pct + '%' : p.confidence}</strong></span>
          <span style="font-size:11px;color:var(--muted)">Expected Impact: ${p.expected_impact}</span>
        </div>
        <div style="font-size:11px;color:var(--muted)">Risk: ${p.risk}</div>
        ${(p.estimated_time_to_observe || p.implementation_difficulty) ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">Time to observe results: <strong>${p.estimated_time_to_observe || '—'}</strong> · Difficulty: <strong>${p.implementation_difficulty || '—'}</strong></div>` : ''}
        ${ciRenderBusinessImpact(p.business_impact)}
        ${ciRenderBusinessImpactRanking(p.business_impact_ranking)}
        ${ciRenderRiskAssessment(p.risk_assessment)}
      </div>`;
    }).join('');
  }
  // Backward-compatible fallback when the advisor bundle isn't available
  // for some reason (e.g. an older cached response) -- the original,
  // simpler recommendation card.
  if ((fallbackRecommendations || []).length) {
    return fallbackRecommendations.map(r => {
      const pcls = r.priority === 'high' ? 'critical' : r.priority === 'medium' ? 'warning' : 'info';
      return `<div class="rec-card ${pcls}" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;gap:8px"><strong style="font-size:13px">${r.action}</strong><span class="badge ${pcls}">${r.priority}</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${r.reason}</div>
      </div>`;
    }).join('');
  }
  return '<div class="empty">No recommendations right now.</div>';
}

function ciBenchmarkGrainRow(label, g) {
  if (!g || g.status !== 'ok') {
    return `<div style="font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border)">${label}: ${(g && g.reason) || 'insufficient data'}</div>`;
  }
  const m = g.metrics || {};
  return `<div style="font-size:12px;padding:8px 0;border-bottom:1px solid var(--border)">
    <strong>${label}</strong> <span style="color:var(--muted)">(vs. ${g.sample_size} other creative${g.sample_size === 1 ? '' : 's'})</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
      ${Object.entries(m).map(([k, v]) => `<span class="badge ${v.status === 'above_average' ? 'excellent' : v.status === 'below_average' ? 'critical' : 'good'}">${k.toUpperCase()} ${v.status.replace('_', ' ')}</span>`).join('')}
    </div>
  </div>`;
}

function ciRenderBenchmark(b) {
  if (!b) return '';
  const bw = b.account_best_worst;
  return `
  <div class="card" style="margin-bottom:20px">
    <div class="section-title" style="margin-bottom:12px">Benchmarking</div>
    ${ciBenchmarkGrainRow('Ad Set', b.comparison?.ad_set)}
    ${ciBenchmarkGrainRow('Campaign', b.comparison?.campaign)}
    ${ciBenchmarkGrainRow('Account', b.comparison?.account)}
    ${b.historical?.status === 'ok' ? `<div style="font-size:12px;padding:8px 0;border-bottom:1px solid var(--border)"><strong>Vs. its own previous snapshot:</strong> ${Object.entries(b.historical.trend).map(([k, v]) => `${k.toUpperCase()} ${v.direction}`).join(', ')}</div>` : ''}
    ${b.previous_version?.status === 'ok' ? `<div style="font-size:12px;padding:8px 0;border-bottom:1px solid var(--border)"><strong>Vs. its previous version</strong> (${b.previous_version.change.field} changed ${b.previous_version.change.date}): ${Object.entries(b.previous_version.comparison).map(([k, v]) => `${k.toUpperCase()} ${v.delta_pct}%`).join(', ')}</div>` : ''}
    ${bw && bw.status === 'ok' ? `<div style="font-size:12px;padding-top:8px">
      ${bw.best ? `<div style="margin-bottom:4px">🏆 Best in account: <strong>${bw.best.ad_name}</strong> (score ${bw.best.score_overall}, gap ${bw.best.score_gap})</div>` : ''}
      ${bw.worst ? `<div>⚠ Weakest in account: ${bw.worst.ad_name} (score ${bw.worst.score_overall}, +${bw.worst.score_gap} ahead of it)</div>` : ''}
    </div>` : ''}
  </div>`;
}

/** Merges the existing lifecycle-event timeline with Phase 44's real business events and state transitions into one sorted, chronological list. */
function ciMergedTimelineRows(d) {
  const rows = (d.timeline?.events || []).map(e => ({ ...e }));
  const rt = d.advisor?.rich_timeline;
  if (rt) {
    (rt.business_events || []).forEach(e => rows.push({ type: e.type, date: e.date, detail: e.detail }));
    // Phase 45 (Task 8) -- state transitions may already be merged, ranged
    // entries (repeat_count/date_range) from advisorEngine.buildStateTransitions();
    // pass those fields through so the render below can show the range
    // instead of a single (misleading) date.
    (rt.state_transitions || []).forEach(e => rows.push({ type: e.type, date: e.date, detail: e.detail, date_range: e.date_range, repeat_count: e.repeat_count }));
  }
  return rows.filter(r => r.date).sort((a, b) => String(a.date).localeCompare(String(b.date)));
}

// PHASE 45 — Executive Decision Layer render helpers (Creative Intelligence

function ciDecisionColorClass(decision) {
  return { SCALE: 'excellent', MONITOR: 'info', OPTIMIZE: 'good', TEST: 'info', PAUSE: 'warning', STOP: 'critical' }[decision] || 'none';
}
// Maps the same badge-class vocabulary to a real theme CSS variable (the
// theme defines --green/--yellow/--orange/--red/--blue, not --excellent
// etc.) for the one place this page needs an actual border color, not a class.
function ciDecisionBorderVar(decision) {
  return { SCALE: '--green', MONITOR: '--blue', OPTIMIZE: '--yellow', TEST: '--blue', PAUSE: '--orange', STOP: '--red' }[decision] || '--border';
}

/** Task 2 -- exactly one recommendation, never a second competing card. */
function ciRenderExecutivePriorityCard(card) {

      <div><div class="detail-label">Confidence</div><div style="font-size:14px;font-weight:600">${card.confidence_pct != null ? card.confidence_pct + '%' : '—'}</div></div>

/** Task 3 -- why not the other 5 decisions. */
function ciRenderWhyNot(whyNot) {
  if (!whyNot || !Object.keys(whyNot).length) return '';

/** Task 13 -- when signals genuinely disagreed and had to be reconciled. */
function ciRenderConsistencyAudit(audit) {

/** Task 12 -- the single most prominent card on the page: the Executive Decision itself. */
function ciRenderExecutiveDecision(ed) {
  if (!ed) return '';
  const cls = ciDecisionColorClass(ed.decision);
  const borderVar = ciDecisionBorderVar(ed.decision);
  return `
  <div class="card" style="margin-bottom:20px;border:2px solid var(${borderVar});background:var(--bg2)">
    <div class="section-title" style="margin-bottom:4px">⭐ Executive Decision</div>

}

/** Task 4 -- Marketing Director Mode. */
function ciRenderMarketingDirectorPlan(plan) {
  if (!plan) return '';
  const steps = [['Today', plan.today], ['Tomorrow', plan.tomorrow], ['This Week', plan.this_week], ['Next Week', plan.next_week], ['Next Month', plan.next_month]].filter(([, text]) => !!text);

/** Task 5/6 -- Winning Formula / Loss Formula, shared bar-chart-style renderer. */
function ciRenderContributionFormula(title, formula) {
  if (!formula) return '';
  if (!formula.available) return `<div class="card" style="margin-bottom:20px"><div class="section-title" style="margin-bottom:8px">${title}</div><div class="empty">${formula.reason}</div></div>`;
  const items = formula.items || [formula.largest_weakness, formula.second_weakness, formula.third_weakness].filter(Boolean);
  return `

async function loadCreativeLibrary() {
  document.getElementById('content').innerHTML = '<div class="loader"><span class="spin">◌</span> Loading Creative Library...</div>';

  if (!window._ci.campaigns.length) {
    try {
      const c = await apiDate('/campaigns?limit=200');
      window._ci.campaigns = c.data || [];
    } catch (e) { window._ci.campaigns = []; }
  }

  const f = window._ci.filters;
  const params = [];
  if (f.campaign_id) params.push('campaign_id=' + encodeURIComponent(f.campaign_id));
  if (f.creative_type) params.push('creative_type=' + encodeURIComponent(f.creative_type));
  if (f.fatigue_status) params.push('fatigue_status=' + encodeURIComponent(f.fatigue_status));
  if (f.min_score) params.push('min_score=' + f.min_score);
  if (f.is_winner) params.push('is_winner=true');
  if (f.is_loser) params.push('is_loser=true');
  if (f.search) params.push('search=' + encodeURIComponent(f.search));

  let lib = { creatives: [], total: 0, warnings: [] };
  try {
    const r = await apiDate('/creative-intelligence/library' + (params.length ? '&' + params.join('&') : ''));
    lib = r.data || lib;
  } catch (e) { /* leave lib as the honest empty default */ }

  const rows = lib.creatives || [];
  const scoreBuckets = [0, 0, 0, 0, 0]; // 0-20, 21-40, 41-60, 61-80, 81-100
  rows.forEach(c => { if (c.score_overall != null) scoreBuckets[Math.min(4, Math.floor(c.score_overall / 20))]++; });
  const bucketLabels = ['0-20', '21-40', '41-60', '61-80', '81-100'];
  const maxBucket = Math.max(1, ...scoreBuckets);

  document.getElementById('content').innerHTML = `
  <div class="filter-bar">
    <select class="form-input" style="width:auto" onchange="ciSetFilter('campaign_id', this.value)">
      <option value="">All Campaigns</option>
      ${window._ci.campaigns.map(c => `<option value="${c.meta_campaign_id}"${f.campaign_id === c.meta_campaign_id ? ' selected' : ''}>${c.name}</option>`).join('')}
    </select>
    <select class="form-input" style="width:auto" onchange="ciSetFilter('creative_type', this.value)">
      <option value="">All Types</option>
      ${['image', 'video', 'carousel'].map(t => `<option value="${t}"${f.creative_type === t ? ' selected' : ''}>${t}</option>`).join('')}
    </select>
    <select class="form-input" style="width:auto" onchange="ciSetFilter('fatigue_status', this.value)">
      <option value="">Any Fatigue</option>
      ${['none', 'early', 'moderate', 'severe'].map(s => `<option value="${s}"${f.fatigue_status === s ? ' selected' : ''}>${s}</option>`).join('')}
    </select>
    <select class="form-input" style="width:auto" onchange="ciSetRoleFilter(this.value)">
      <option value="">Winner / Loser: All</option>
      <option value="winner"${f.is_winner ? ' selected' : ''}>Winners Only</option>
      <option value="loser"${f.is_loser ? ' selected' : ''}>Underperformers Only</option>
    </select>
    <input class="form-input" style="width:220px" placeholder="Search headline / copy..." value="${f.search || ''}" onkeydown="if(event.key==='Enter')ciSetFilter('search', this.value)">
    <button class="btn btn-ghost btn-sm" onclick="ciClearFilters()">Clear</button>
  </div>

  ${(lib.warnings || []).map(w => `<div style="padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--muted)">⚠ ${w}</div>`).join('')}

  <div class="card" style="margin-bottom:20px">
    <div class="section-title" style="margin-bottom:16px">Score Distribution (${rows.length} creative${rows.length === 1 ? '' : 's'})</div>
    <div class="chart-wrap">
      <div class="chart-bars">
        ${bucketLabels.map((lbl, i) => `
        <div class="bar-wrap" title="${scoreBuckets[i]} creative(s) scoring ${lbl}">
          <div class="bar" style="height:${Math.round((scoreBuckets[i] / maxBucket) * 70)}px;background:var(--accent2)"></div>
          <div class="bar-label">${lbl}</div>
        </div>`).join('')}

  </div>
  `;
}

async function viewCreativeDetails(adId) {

// ════════════════════════════════════════════
// PHASE 6C — Global State + Helpers
// ════════════════════════════════════════════

// Global date range state
window._dr = { preset: 'last_7_days', since: null, until: null };
window._accountId = '';

// Load accounts into selector -- called on boot AND after any account
// add/edit/remove so the header dropdown never goes stale without a page
// refresh.
async function loadAccountSelector() {
  try {
    const r = await fetch(API + '/accounts');
    const j = await r.json();
    window._accountsCache = j.data || []; // Phase 8: populate cache used by hasValidToken()
    const sel = document.getElementById('acct-selector');
    if (!sel) return;
    // Clear all options except the first ("All Accounts") before
    // repopulating -- otherwise re-running this after an account change
    // duplicates every existing option.
    while (sel.options.length > 1) sel.remove(1);
    // Removed/disconnected accounts are hidden from the selector (soft
    // remove); disabled (paused) accounts still show so their history
    // remains viewable.
    (j.data || []).filter(a => a.status !== 'disconnected').forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.account_name + (a.client_label ? ' — ' + a.client_label : '') + (a.token_is_valid ? '' : ' (no live data)') + (a.status === 'paused' ? ' (disabled)' : '');
      sel.appendChild(opt);
    });
    // If the currently-selected account no longer exists in the list
    // (e.g. it was just removed), fall back to "All Accounts".
    if (window._accountId && !sel.querySelector(`option[value="${window._accountId}"]`)) {
      window._accountId = '';
    }
    sel.value = window._accountId;
  } catch {}
}

function setAccount(id) {
  const changed = window._accountId !== id;
  window._accountId = id;
  // The Intelligence Center's selected campaign/ad set almost certainly
  // belongs to the OLD account and does not exist in the new account's
  // campaign list -- previously nothing cleared it, so switching accounts
  // left a stale, wrong-account campaign "selected" (confirmed via code
  // trace: loadCampaigns() only defaults selectedCampaign when it's falsy,
  // so a leftover value from the prior account was never replaced),
  // producing widgets/insights for a campaign that doesn't belong to the
  // newly selected account. Only reset on an actual account change --
  // date-range-only refreshes (setPreset/setCustomRange also call
  // refreshData()) must keep the user's current campaign selection.
  if (changed && window.ic) {
    window.ic.selectedCampaign = null;
    window.ic.selectedAdSet    = null;
    window.ic.level            = 'campaign';
  }
  refreshData();
}

function setPreset(preset) {
  window._dr = { preset, since: null, until: null };
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('dbtn-' + preset);
  if (btn) btn.classList.add('active');
  refreshData();
}

function setCustomRange() {
  const since = document.getElementById('custom-since')?.value;
  const until = document.getElementById('custom-until')?.value;
  if (since && until) {
    window._dr = { preset: 'custom', since, until };
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    refreshData();
  }
}

// Build query string from global date state
function dateParams() {
  const p = [];
  if (window._dr.preset && window._dr.preset !== 'custom') p.push('preset=' + window._dr.preset);
  if (window._dr.since)  p.push('since=' + window._dr.since);
  if (window._dr.until)  p.push('until=' + window._dr.until);
  if (window._accountId) p.push('account_id=' + window._accountId);
  return p.length ? '?' + p.join('&') : '';
}

// API call with automatic date range params appended
function apiDate(path) {
  const sep = path.includes('?') ? '&' : '?';
  return api(path + (icDateQ().length ? sep + icDateQ() : ''));
}

// Build date+account query string (used everywhere)
function icDateQ() {
  const p = [];
  if (window._dr.preset && window._dr.preset !== 'custom') p.push('preset=' + window._dr.preset);
  if (window._dr.since)  p.push('since=' + window._dr.since);
  if (window._dr.until)  p.push('until=' + window._dr.until);
  if (window._accountId) p.push('account_id=' + window._accountId);
  return p.join('&');
}

// Append date+account params to any URL.
function addDateQ(url) {
  const q = icDateQ();
  return q ? url + (url.includes('?') ? '&' : '?') + q : url;
}

// ════════════════════════════════════════════
// PHASE 8 — Production Readiness: real-vs-mock decision
// ════════════════════════════════════════════
// window._accountsCache holds the /accounts response so we can check
// token_is_valid without re-fetching on every insight call.
window._accountsCache = null;

async function ensureAccountsCache() {
  if (window._accountsCache) return window._accountsCache;
  try {
    const r = await fetch(API + '/accounts');
    const j = await r.json();
    window._accountsCache = j.data || [];
  } catch { window._accountsCache = []; }
  return window._accountsCache;
}

// Does the currently selected account (or the campaign's own account) have
// a token marked valid? If not, fall back to mock ONLY in that case —
// never hardcode it. This makes mock mode an explicit, visible fallback
// rather than a silent default, and the UI will show "(mock data)" when active.
function hasValidToken() {
  const accounts = window._accountsCache || [];
  if (!accounts.length) return false; // no accounts loaded yet — be conservative, do not assume real data
  const targetId = window._accountId || (window.ic?.selectedCampaign?.ad_account_id);
  const acct = targetId
    ? accounts.find(a => a.id === targetId)
    : accounts[0]; // single-account fallback for convenience
  return !!(acct && acct.token_is_valid);
}

// Build the correct insights URL: real data by default, mock ONLY as an
// explicit, visible fallback when no valid token exists anywhere.
// Never silently hardcoded — this is the single source of truth Phase 8 requires.
function insightsUrl(baseUrl) {
  return hasValidToken() ? baseUrl : (baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'mock=true');
}

async function loadPortfolio() {
  document.getElementById('content').innerHTML = '<div class="loader"><span class="spin">◌</span> Loading portfolio...</div>';
  const [overview, rankings, objectives, alerts] = await Promise.all([
    apiDate('/portfolio'),
    apiDate('/portfolio/accounts'),
    apiDate('/portfolio/objectives'),
    apiDate('/portfolio/alerts'),
  ]);

  const ph = overview.data?.portfolio_health || {};
  const sc  = ph.score;

// ════════════════════════════════════════════
// SCORE BREAKDOWN PANEL — Phase 6C
// ════════════════════════════════════════════
async function loadScoreBreakdown(entityId, entityType, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div class="loader"><span class="spin">◌</span></div>';

  try {
    const typeMap = { campaign: 'campaigns', ad_set: 'adsets', ad: 'ads' };
    const prefix  = typeMap[entityType] || 'campaigns';
    const r = await api(`/${prefix}/${entityId}/score-breakdown`);
    const d = r.data;

    if (!d.analyzed) {
      el.innerHTML = `<div class="breakdown-panel"><div class="empty">${d.message}</div></div>`;
      return;
    }

    const contribs = (d.contributions || []).map(c => {
      const barColor = c.classification === 'positive' ? 'var(--green)' : c.classification === 'negative' ? 'var(--red)' : 'var(--yellow)';
      const barW = c.normalized_score !== null ? c.normalized_score : 0;
      return `<div>
        <div class="breakdown-row">
          <div class="breakdown-metric">${c.display_label}</div>
          <div class="breakdown-bar-outer"><div class="breakdown-bar-inner" style="width:${barW}%;background:${barColor}"></div></div>
          <div class="breakdown-val">${c.formatted_value}</div>
          <div class="breakdown-weight">${c.weight_pct}%</div>
          <div style="width:60px;text-align:right;font-size:11px;color:${barColor}">${c.normalized_score ?? '—'}/100</div>
        </div>
        <div class="breakdown-interp" style="padding-left:188px">${c.interpretation}</div>
      </div>`;
    }).join('');

    const pos = d.positive_factors?.length ? `<div style="color:var(--green);font-size:12px;margin-top:8px">✓ ${d.positive_factors.join(' · ')}</div>` : '';
    const neg = d.negative_factors?.length ? `<div style="color:var(--red);font-size:12px;margin-top:4px">✗ ${d.negative_factors.join(' · ')}</div>` : '';

    el.innerHTML = `<div class="breakdown-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title">Why score = ${d.health_score}?</div>
        <span class="badge ${d.health_status}">${d.health_status} · ${d.score_reference}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px">
        <span>Metric</span><span style="margin-left:auto">Value</span><span style="width:40px;text-align:right">Weight</span><span style="width:60px;text-align:right">Score</span>
      </div>
      ${contribs}
      ${pos}${neg}
    </div>`;
  } catch(e) {
    el.innerHTML = `<div class="breakdown-panel"><div class="empty">Could not load breakdown.</div></div>`;
  }
}

function toggleBreakdown(entityId, entityType) {
  const el = document.getElementById('score-breakdown-panel');
  if (!el) return;
  if (el.innerHTML.trim()) { el.innerHTML = ''; return; }
  loadScoreBreakdown(entityId, entityType, 'score-breakdown-panel');
}

// Meta has no data beyond today; the custom range inputs previously had no
// upper bound, so a user could silently pick a future date and get an
// unexplained empty "No Data" result (confirmed live: GET /dashboard with a
// future since/until returns 200 with no validation error). This only
// disables picking a later date in the native picker -- it does not change
// any request/response behavior.
(function capCustomDateInputs() {
  const max = new Date().toISOString().slice(0, 10);
  const since = document.getElementById('custom-since');
  const until = document.getElementById('custom-until');
  if (since) since.max = max;
  if (until) until.max = max;
})();
</script>
