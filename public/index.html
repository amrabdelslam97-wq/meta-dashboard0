<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meta Ads Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3250;
  --text:#e2e8f0;--muted:#8892a4;--accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;
  --green-bg:rgba(34,197,94,.12);--yellow-bg:rgba(234,179,8,.12);
  --orange-bg:rgba(249,115,22,.12);--red-bg:rgba(239,68,68,.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
  --sidebar:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo h1{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.3px}
.logo p{font-size:11px;color:var(--muted);margin-top:2px}
nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent2)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-badge.warn{background:var(--orange)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}

/* ── Main ── */
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:24px;flex:1}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-success{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:14px 16px}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}

/* ── Stat Cards ── */
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:12px;color:var(--muted);margin-top:5px}

/* ── Health Score ── */
.score-ring{display:inline-flex;flex-direction:column;align-items:center;gap:4px}
.score-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border:3px solid}
.score-circle.excellent{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.score-circle.good{color:var(--yellow);border-color:var(--yellow);background:var(--yellow-bg)}
.score-circle.warning{color:var(--orange);border-color:var(--orange);background:var(--orange-bg)}
.score-circle.critical{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.score-circle.none{color:var(--muted);border-color:var(--border);background:var(--bg3)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.badge.excellent{background:var(--green-bg);color:var(--green)}
.badge.good{background:var(--yellow-bg);color:var(--yellow)}
.badge.warning{background:var(--orange-bg);color:var(--orange)}
.badge.critical{background:var(--red-bg);color:var(--red)}
.badge.info{background:var(--blue-bg);color:var(--blue)}
.badge.none{background:var(--bg3);color:var(--muted)}
.badge.not_delivering{background:var(--bg3);color:var(--muted);font-style:italic}

/* ── Table ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg2)}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(46,50,80,.5)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(99,102,241,.04)}
.td-name{font-weight:500;color:var(--text)}
.td-muted{color:var(--muted)}

/* ── Chip / Pill ── */
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.chip.active{background:rgba(34,197,94,.12);color:var(--green)}
.chip.paused{background:rgba(234,179,8,.1);color:var(--yellow)}
.chip.archived{background:var(--bg3);color:var(--muted)}
.chip.engagement{background:rgba(99,102,241,.15);color:var(--accent2)}
.chip.leads{background:rgba(59,130,246,.15);color:var(--blue)}
.chip.sales{background:rgba(34,197,94,.12);color:var(--green)}
.chip.traffic{background:rgba(249,115,22,.12);color:var(--orange)}
.chip.awareness{background:rgba(168,85,247,.12);color:#c084fc}
.chip.app_promotion{background:rgba(236,72,153,.12);color:#f472b6}
.chip.unknown{background:var(--bg3);color:var(--muted)}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:600;color:var(--text)}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Filters bar ── */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}

/* ── Recommendation Card ── */
.rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.rec-card.critical{border-left:3px solid var(--red)}
.rec-card.warning{border-left:3px solid var(--orange)}
.rec-card.info{border-left:3px solid var(--blue)}
.rec-title{font-size:13px;font-weight:600;margin-bottom:4px}
.rec-body{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.rec-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rec-actions{display:flex;gap:6px;margin-top:10px}

/* ── Alert Card ── */
.alert-row td{vertical-align:middle}
.alert-row.critical td:first-child{border-left:3px solid var(--red)}
.alert-row.warning td:first-child{border-left:3px solid var(--orange)}
.alert-row.info td:first-child{border-left:3px solid var(--blue)}

/* ── Trend Chart ── */
.chart-wrap{padding:12px 0;position:relative}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default}
.bar{width:100%;border-radius:3px 3px 0 0;transition:opacity .15s;min-height:3px}
.bar:hover{opacity:.8}
.bar-label{font-size:9px;color:var(--muted)}

/* ── Details panel ── */
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-item{background:var(--bg3);border-radius:8px;padding:12px 14px}
.detail-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.detail-value{font-size:18px;font-weight:700}
.detail-value.small{font-size:14px}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* ── Settings form ── */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Misc ── */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.empty svg{margin-bottom:10px;opacity:.4}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:8px}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.text-muted{color:var(--muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-orange{color:var(--orange)}
.text-yellow{color:var(--yellow)}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.flex{display:flex}.items-center{align-items:center}.gap8{gap:8px}.gap12{gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:440px;max-width:95vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
textarea.form-input{resize:vertical;min-height:80px}

/* Phase 4 additions */
.freshness-bar{padding:8px 24px;background:rgba(99,102,241,.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px}
.freshness-bar.warn{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.2)}
.freshness-bar .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.freshness-bar.warn .dot{background:var(--orange)}
.delta{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
.delta.pos{color:var(--green)}.delta.neg{color:var(--red)}.delta.neu{color:var(--muted)}
.metric-with-delta{display:flex;flex-direction:column;gap:2px}
.breakdown-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.breakdown-bar-label{width:90px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.breakdown-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.breakdown-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s}
.breakdown-bar-val{font-size:12px;width:80px;text-align:right;flex-shrink:0}
.source-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase}
.source-badge.live{background:var(--green-bg);color:var(--green)}
.source-badge.mock{background:var(--blue-bg);color:var(--blue)}
.source-badge.cached{background:var(--yellow-bg);color:var(--yellow)}
.tabs-inner{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab-inner{padding:7px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-inner:hover{color:var(--text)}
.tab-inner.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* Phase 5 — Decision Center */
.decision-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.decision-card.critical{border-left:4px solid var(--red)}
.decision-card.high{border-left:4px solid var(--orange)}
.decision-card.medium{border-left:4px solid var(--yellow)}
.decision-card.low{border-left:4px solid var(--muted)}
.decision-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.decision-label{font-size:14px;font-weight:700}
.decision-reason{font-size:12px;color:var(--muted);line-height:1.5}
.decision-action{font-size:12px;background:var(--bg3);border-radius:6px;padding:8px 10px;border-left:2px solid var(--accent)}
.decision-metrics{display:flex;gap:12px;flex-wrap:wrap}
.decision-metric{font-size:11px;background:var(--bg3);padding:3px 8px;border-radius:5px;color:var(--muted)}
.decision-actions{display:flex;gap:6px;flex-wrap:wrap}
.priority-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.priority-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.priority-pill.critical{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.3)}
.priority-pill.high{background:var(--orange-bg);color:var(--orange);border-color:rgba(249,115,22,.3)}
.priority-pill.medium{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(234,179,8,.3)}
.priority-pill.low{background:var(--bg3);color:var(--muted);border-color:var(--border)}
.winner-card,.loser-card{padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.opp-card{padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.opp-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);margin-bottom:4px}
.opp-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.confidence-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.confidence-badge.high{background:var(--green-bg);color:var(--green)}
.confidence-badge.medium{background:var(--yellow-bg);color:var(--yellow)}
.confidence-badge.low{background:var(--bg3);color:var(--muted)}
.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.report-stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.report-stat-val{font-size:28px;font-weight:800}
.report-stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* ── Phase 6C ── */
.date-bar{display:flex;align-items:center;gap:6px;padding:8px 24px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.date-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .12s}
.date-btn:hover{background:var(--bg3);color:var(--text)}
.date-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.date-custom{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:6px;font-size:12px}
.acct-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;margin-left:auto}
.kpi-hero{background:var(--bg3);border-radius:8px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.kpi-hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-hero-value{font-size:28px;font-weight:800}
.kpi-hero-cost{font-size:13px;color:var(--muted);margin-top:3px}
.breakdown-panel{background:var(--bg3);border-radius:10px;padding:14px;margin-top:12px}
.breakdown-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:8px;font-size:12px}
.breakdown-row:last-child{border-bottom:none}
.breakdown-metric{width:180px;flex-shrink:0;font-weight:500}
.breakdown-bar-outer{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.breakdown-bar-inner{height:100%;border-radius:4px;transition:width .4s}
.breakdown-val{width:60px;text-align:right;flex-shrink:0}
.breakdown-weight{width:40px;text-align:right;color:var(--muted);flex-shrink:0}
.breakdown-interp{color:var(--muted);font-size:11px;margin-top:2px}
.portfolio-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.portfolio-rank{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.portfolio-rank:last-child{border-bottom:none}

/* ── Intelligence Center (Campaign page) ── */
.ic-wrap{display:flex;flex-direction:column;height:100%;gap:0}
.ic-topbar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:auto}
.ic-header-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.ic-header-pill{padding:2px 8px;background:var(--bg3);border-radius:6px;font-size:11px;white-space:nowrap}
.ic-campaign-select{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;outline:none}
.ic-campaign-select:focus{border-color:var(--accent)}
.ic-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.ic-breadcrumb .bc-item{color:var(--accent2);cursor:pointer}
.ic-breadcrumb .bc-item:hover{text-decoration:underline}
.ic-breadcrumb .bc-sep{color:var(--border)}
.ic-breadcrumb .bc-current{color:var(--text);font-weight:500}
.ic-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.ic-tab{padding:9px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:6px}
.ic-tab:hover{color:var(--text)}
.ic-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.ic-tab .ic-tab-count{background:var(--bg3);padding:1px 6px;border-radius:8px;font-size:11px}
.ic-tab.active .ic-tab-count{background:rgba(99,102,241,.2)}
.ic-hero{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.ic-kpi-card{background:var(--bg3);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.ic-kpi-card.primary{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(99,102,241,.05));border:1px solid rgba(99,102,241,.3)}
.ic-kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ic-kpi-value{font-size:22px;font-weight:800;line-height:1}
.ic-kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.hs-inline{display:flex;align-items:center;gap:8px}
.ic-adset-row,.ic-ad-row{display:grid;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .1s;cursor:default}
.ic-adset-row{grid-template-columns:2fr 70px 70px 100px 100px 90px 80px 70px 100px auto}
.ic-ad-row{grid-template-columns:2fr 70px 70px 100px 90px 70px 90px 60px auto}
.ic-adset-row:hover,.ic-ad-row:hover{background:rgba(99,102,241,.04)}

<script>
const API = '/api/v1';
let currentPage = 'dashboard';
let dashboardData = null;

// ─── API helpers ───────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(API + path, { headers:{'Content-Type':'application/json'}, ...opts });
  return r.json();
}
async function apiPatch(path, body) {
  return api(path, { method:'PATCH', body: JSON.stringify(body) });
}
async function apiPost(path, body) {
  return api(path, { method:'POST', body: JSON.stringify(body) });
}
async function apiDelete(path) {
  return api(path, { method:'DELETE' });
}

// ─── Navigation ────────────────────────────────────────────────
function navigate(page, params={}) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { dashboard:'dashboard', campaigns:'campaigns', recommendations:'recommendations', alerts:'alerts', settings:'settings', creative:'creative' };
  const btn = document.querySelector(`.nav-item[onclick*="${navMap[page] || page}"]`);
  if (btn) btn.classList.add('active');
  const titles = { portfolio:'Portfolio', dashboard:'Control Center', campaigns:'Campaigns', recommendations:'Recommendations', alerts:'Alert Center', decisions:'Decision Center', reports:'Reports', settings:'Settings', creative:'Creative Intelligence' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader"><span class="spin">◌</span> Loading...</div>';
  const pages = { portfolio: loadPortfolio, dashboard: loadDashboard, campaigns: loadCampaigns, recommendations: loadRecommendations, alerts: loadAlerts, decisions: loadDecisions, reports: loadReports, settings: loadSettings, creative: loadCreativeLibrary };
  if (pages[page]) pages[page](params);
}

function refreshData() {
  // Clear IC cached insights so next render re-fetches with new account/date
  // range. Objective Intelligence, Executive Summary, Rule Engine decisions
  // and Governance are all embedded fields inside the insights/diagnosis
  // response itself (not separately cached), so nulling these two covers
  // all of them -- no separate cache to invalidate for those.
  if (window.ic) {
    window.ic.insights  = null;
    window.ic.adsets    = [];
    window.ic.ads       = [];
    window.ic.diagnosis = null;
  }
  // Header alert/recommendation badges are visible on every page, not just
  // the current one -- refresh them immediately so they reflect the newly
  // selected account without waiting for a nav into the Dashboard page.
  updateBadges();
  // Clear server-side cache then reload page. Recommendations, Alerts,
  // Decisions, Portfolio, Reports and Campaigns have no client-side cache at
  // all -- they always fetch fresh -- so re-navigating to the current page
  // (which now also passes window._accountId on every one of those calls)
  // is sufficient to reload them for the newly selected account.
  //
  // Phase 38 -- the backend route already supports a scoped, per-account
  // flush (POST /sync/cache/flush with {account_id}, see sync.js), but this
  // call always sent an empty body, so EVERY refresh (including a plain
  // date-range change on a single selected account) flushed the entire
  // cache for every account. Passing window._accountId (when a specific
  // account is selected) now uses that existing scoped path instead;
  // "All Accounts" (empty _accountId) still does a full flush, which is
  // correct for that view -- no backend change needed, no behavior change
  // for the "All Accounts" case.
  fetch(API + '/sync/cache/flush', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(window._accountId ? { account_id: window._accountId } : {}) })
    .catch(() => {})
    .finally(() => navigate(currentPage));
}

// ─── Phase 38: sync-freshness label ─────────────────────────────
// Turns the additive `freshness` field (dashboard.js/campaigns.js) into a
// human string, e.g. "Updated 5m ago" or "Updated 2h ago (stale)". Falls
// back to "just now" only when sync_age_minutes is genuinely near-zero --
// never used to fake freshness for data that's actually old.
function freshnessLabel(freshness) {
  if (!freshness || freshness.sync_age_minutes === null || freshness.sync_age_minutes === undefined) {
    return 'Updated —';
  }
  const m = freshness.sync_age_minutes;
  const span = m < 1 ? 'just now' : m < 60 ? `${m}m ago` : `${Math.round(m / 60)}h ago`;
  return `Updated ${span}` + (freshness.stale ? ' <span class="text-orange">(stale)</span>' : '');
}

// ─── Helpers ───────────────────────────────────────────────────
function scoreClass(s) {
  if (s === null || s === undefined) return 'none';
  if (s >= 80) return 'excellent';
  if (s >= 60) return 'good';
  if (s >= 40) return 'warning';
  return 'critical';
}
function scoreLabel(s) {
  if (s === null || s === undefined) return '—';
  if (s >= 80) return 'Excellent';
  if (s >= 60) return 'Good';
  if (s >= 40) return 'Warning';
  return 'Critical';
}
// Formats a health_status value for display -- 'not_delivering' (this
// entity isn't actually delivering per Meta, so it was never scored) reads
// as "Not Delivering" instead of the raw snake_case DB value.
function fmtHealthStatus(s) {
  if (!s) return 'Not analyzed';
  if (s === 'not_delivering') return 'Not Delivering';
  return s;
}
function severityClass(s) {
  return { critical:'critical', warning:'warning', info:'info' }[s] || 'none';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtNum(n, dec=2) {
  if (n === null || n === undefined) return '—';
  return Number(n).toFixed(dec);
}
function objChip(o) {
  return `<span class="chip ${o||'unknown'}">${o||'unknown'}</span>`;
}

// ── Framework Attribution panel (Phase 10 — MAIFS/MMS governance trace) ──
// Renders the `_governance` object attached by mmsOrchestrator.js to the
// GET .../insights and GET .../insights/diagnosis responses. Purely
// presentational -- shows which Meta Frameworks governed this result and
// which documented rule produced each fired recommendation/alert, without
// recomputing anything.
function icGovernancePanel(gov) {
  if (!gov) return '';
  const frameworkChips = (gov.frameworks || []).map(f =>
    `<span class="chip" style="background:var(--bg3);color:var(--accent2)" title="${f.status||''}">${f.code}${f.name ? ' · ' + f.name : ''}</span>`
  ).join('');

  const provenanceLines = [
    ...(gov.recommendation_provenance || []).filter(p => p.provenance).map(p =>
      `<div style="font-size:11px;color:var(--muted);padding:3px 0">💡 ${p.rule_code} ← <strong style="color:var(--text)">${p.provenance.framework}</strong>: ${p.provenance.docRule}</div>`),
    ...(gov.alert_provenance || []).filter(p => p.provenance).map(p =>
      `<div style="font-size:11px;color:var(--muted);padding:3px 0">🔔 ${p.alert_code} ← <strong style="color:var(--text)">${p.provenance.framework}</strong>: ${p.provenance.docRule}</div>`),
  ].join('');

  const selfCheckOk = gov.self_check?.overall === 'passed';

  return `
    <div class="card" style="margin-top:12px">
      <div class="section-title" style="margin-bottom:10px">🏛 Framework Attribution <span style="font-size:10px;color:var(--muted);font-weight:400">MAIFS/MMS governance trace</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${frameworkChips}</div>
      ${gov.root_cause_category ? `<div style="font-size:12px;color:var(--muted);margin-bottom:6px">Root Cause Category (MF8.5): <strong style="color:var(--text);text-transform:capitalize">${gov.root_cause_category.replace('_',' ')}</strong></div>` : ''}
      ${provenanceLines}
      <div style="margin-top:8px">
        <span class="badge ${selfCheckOk ? 'excellent' : 'critical'}" style="font-size:10px">${selfCheckOk ? '✓ Governance Self-Check Passed' : '⚠ Governance Self-Check Failed'}</span>
      </div>
    </div>`;
}

// ── Framework Rule Engine panel (Phase 11) ──
// Renders `framework_recommendations` (raw fired Rule Engine findings) and
// `rule_engine_decisions` (the same findings shaped as Decisions, for the
// suggested_action text) attached by ruleEngine.js/decisionEngine.js to the
// GET .../insights and GET .../insights/diagnosis responses. Every card
// shows the full attribution the user should be able to trace a
// recommendation back through: Framework, Rule ID, Rule Name, Severity,
// Evidence, Reason, Recommendation, Priority, Confidence.
function icGovernanceStateBadge(state) {
  // MAIFS Enforcement (Phase 4) -- passed/warning/failed reflects whether
  // this specific recommendation was downgraded by governance, not just a
  // generic status. 'failed' means enforceGovernance() already downgraded
  // the paired decision to observation_only -- the badge documents why.
  const cls = { passed: 'excellent', warning: 'warning', failed: 'critical' }[state] || 'none';
  const label = { passed: '✓ Governance: Passed', warning: '⚠ Governance: Warning', failed: '⛔ Governance: Failed (downgraded)' }[state] || 'Governance: —';
  return `<span class="badge ${cls}" style="font-size:10px">${label}</span>`;
}

// ── MMS Cross-Account Trace (Phase X.4 — MMS Runtime Kernel) ──
// Renders the `_governance` field attached by mmsOrchestrator.buildPortfolioTrace()
// to cross-account/portfolio-grain responses (Decision Center, Portfolio).
// Deliberately distinct from icGovernanceStateBadge() (per-decision
// passed/warning/failed, Phase X.3) -- this is a page-level trace showing
// WHICH Frameworks this cross-account view is attributed to (MF10 always
// present), with governance explicitly reported as "Not Applicable" rather
// than a fake pass/fail, since no live metrics exist to validate against at
// this grain. Never to be confused with the per-decision badge.
function icPortfolioTraceBadge(gov) {
  if (!gov) return '';
  const fwList = (gov.frameworks || []).map(f => f.code).join(' · ');
  return `
    <span class="chip" style="background:var(--bg3)" title="${gov.governance_reason || ''}">
      🧭 MMS Trace: ${fwList}
    </span>
    <span class="badge none" style="font-size:10px" title="${gov.governance_reason || ''}">Governance: Not Applicable (cross-account)</span>
  `;
}

// ── Executive Summary (Product Completion Mode, Milestone 1) ──
// Renders `executive_summary` (a plain-language string assembled server-side
// by executiveSummaryEngine.js from objective/health/diagnosis/decisions
// already computed by the existing pipeline -- no new engine, no LLM). The
// first thing shown when a campaign loads, per the milestone's "visible
// value" requirement.
function icExecutiveSummaryCard(summary) {
  if (!summary) return '';
  return `
    <div class="card" style="margin-bottom:16px;border-left:3px solid var(--accent2);background:var(--bg3)">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="font-size:20px;line-height:1">🧭</div>
        <div>
          <div class="stat-label" style="margin-bottom:4px">Executive Summary</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">${summary}</div>
        </div>
      </div>
    </div>
  `;
}

// ── Objective Intelligence (Product Completion Mode, Milestone 2) ──
// Renders `objective_intelligence` (server-assembled by
// objectiveIntelligenceEngine.js from already-computed benchmark/diagnosis/
// rule/governance data -- no new calculation happens client-side). The
// primary analysis section: detected objective, per-KPI formula/threshold/
// verdict table, root cause, and MAIFS status, reusing icFmtVal() for
// display formatting and icGovernanceStateBadge() for governance badges.
function icObjectiveIntelligenceStatusBadge(status) {
  const cls = { success: 'excellent', warning: 'warning', failure: 'critical', unknown: 'none' }[status] || 'none';
  const label = { success: '✓ Success', warning: '⚠ Warning', failure: '⛔ Failure', unknown: '— Unknown' }[status] || status;
  return `<span class="badge ${cls}" style="font-size:10px">${label}</span>`;
}

// Milestone 3 — severity/confidence badges reuse the same badge-class
// convention as icDiagBadgeClass() (Executive Diagnosis Card, Phase X.5)
// rather than a new color scheme.
function icKpiSeverityBadgeClass(severity) {
  return { critical: 'critical', high: 'warning', medium: 'good', low: 'none', none: 'none' }[severity] || 'none';
}

function icObjectiveIntelligenceKpiCard(kpi, currency) {
  return `
  <div class="card" style="margin-bottom:10px;border-left:3px solid ${kpi.status==='failure'?'var(--red)':kpi.status==='warning'?'var(--orange)':'var(--accent2)'}">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;font-weight:600">${kpi.metric_name}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${icObjectiveIntelligenceStatusBadge(kpi.status)}
        ${kpi.severity && kpi.severity !== 'none' ? `<span class="badge ${icKpiSeverityBadgeClass(kpi.severity)}" style="font-size:10px">${kpi.severity} severity</span>` : ''}
        ${kpi.confidence ? `<span class="badge ${icDiagBadgeClass('confidence', kpi.confidence)}" style="font-size:10px">${kpi.confidence} confidence</span>` : ''}
      </div>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:12px">
      <div><span style="color:var(--muted)">Current:</span> <strong>${icFmtVal(kpi.metric_key, kpi.current_value, currency)}</strong></div>
      <div><span style="color:var(--muted)">Benchmark:</span> <strong>${icFmtVal(kpi.metric_key, kpi.benchmark, currency)}</strong></div>
      <div><span style="color:var(--muted)">Success ≥/≤:</span> <strong>${icFmtVal(kpi.metric_key, kpi.success_threshold, currency)}</strong></div>
      <div><span style="color:var(--muted)">Warning:</span> <strong>${icFmtVal(kpi.metric_key, kpi.warning_threshold, currency)}</strong></div>
      <div><span style="color:var(--muted)">Failure:</span> <strong>${icFmtVal(kpi.metric_key, kpi.failure_threshold, currency)}</strong></div>
    </div>
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">📐 <strong>Formula:</strong> ${kpi.formula_used}</div>

async function updateBadges() {
  try {
    const d = await apiDate('/dashboard');
    const ac = d.summary?.alerts?.critical || 0;
    const aw = d.summary?.alerts?.warning || 0;
    const rt = d.summary?.recommendations?.total || 0;
    const ab = document.getElementById('badge-alert');
    const rb = document.getElementById('badge-rec');
    if (ac > 0) { ab.textContent = ac; ab.style.display=''; ab.classList.remove('warn'); }
    else if (aw > 0) { ab.textContent = aw; ab.style.display=''; ab.classList.add('warn'); }
    else ab.style.display='none';
    if (rt > 0) { rb.textContent = rt; rb.style.display=''; } else rb.style.display='none';
  } catch(e) {}
}

let syncStatusPollHandle = null;

function fmtWhen(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}
function fmtDuration(ms) {
  if (ms === null || ms === undefined) return '—';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

async function refreshSyncStatusCard() {
  const el = document.getElementById('sync-status-card');
  if (!el) return;
  let data;
  try {
    const r = await api('/sync/scheduler-status');
    data = r.data;
  } catch (e) { return; }
  if (!data) return;

  const running = data.scheduler_status === 'running';
  const rateLimited = data.meta_api.rate_limit_status === 'limited';

  el.innerHTML = `
    <div class="section-header">
      <div><span class="section-title">Executive Sync Status</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${running ? 'excellent' : 'warning'}">${running ? '● Running' : '⏸ Paused'}</span>
        <button class="btn btn-ghost btn-sm" onclick="toggleScheduler(${running})">${running ? 'Pause' : 'Resume'}</button>
      </div>
    </div>
    <div class="grid grid-4" style="gap:12px;margin-top:8px">
      <div>
        <div class="stat-label">Accounts</div>
        <div style="font-size:13px;margin-top:4px">
          <div>Connected: <strong>${data.accounts.connected}</strong></div>
          <div>Waiting: <strong>${data.accounts.waiting}</strong></div>
          <div>Syncing: <strong class="text-green">${data.accounts.syncing}</strong></div>
          <div>Completed: <strong>${data.accounts.completed}</strong></div>
        </div>
      </div>
      <div>
        <div class="stat-label">Current Cycle</div>
        <div style="font-size:13px;margin-top:4px">
          <div>Current Account: <strong>${data.current_account ? data.current_account.name : '—'}</strong></div>
          <div>Current Step: <strong>${data.current_entity_type || '—'}</strong></div>
          <div>Queue Position: <strong>${data.queue_position}/${data.queue_size}</strong></div>
          <div>Progress: <strong>${data.progress_pct}%</strong></div>
        </div>
      </div>
      <div>
        <div class="stat-label">Freshness</div>
        <div style="font-size:13px;margin-top:4px">

          <div>Last Success: <strong class="text-green">${fmtWhen(data.last_successful_sync_at)}</strong></div>
          <div>Last Failed: <strong class="${data.last_failed_sync_at ? 'text-red' : ''}">${fmtWhen(data.last_failed_sync_at)}</strong></div>

        </div>
      </div>
      <div>
        <div class="stat-label">Meta API</div>
        <div style="font-size:13px;margin-top:4px">
          <div>Rate Limit: <strong class="${rateLimited ? 'text-orange' : 'text-green'}">${rateLimited ? 'Limited' : 'OK'}</strong></div>

    <div class="table-wrap" style="margin-top:14px">
      <table>
        <thead><tr>
          <th>Account</th><th>Auto Sync</th><th>Scheduler</th><th>Queue</th><th>Tier</th>

          ${(data.per_account || []).map(a => renderPerAccountStatusRow(a)).join('')}

function schedulerStateBadge(state) {
  const map = {
    disabled:     { cls: 'none',      label: '⏸ Auto Sync Disabled' },
    disconnected: { cls: 'critical',  label: 'Disconnected' },
    syncing:      { cls: 'excellent', label: '● Syncing' },
    cooldown:     { cls: 'warning',   label: '⏳ Cooldown' },
    queued:       { cls: 'info',      label: 'Queued' },
    idle:         { cls: 'good',      label: '✓ Auto Sync Enabled' },
  };
  const m = map[state] || { cls: 'none', label: state || '—' };
  return `<span class="badge ${m.cls}" style="font-size:10px">${m.label}</span>`;
}

function renderPerAccountStatusRow(a) {
  const fresh = a.freshness || [];
  const staleCount = fresh.filter(f => f.is_stale).length;
  const freshnessTitle = fresh.map(f => `${f.entity_type}: ${f.is_stale ? 'stale' : 'fresh'} (every ${f.interval_minutes}m)`).join('\n');
  return `
    <tr>
      <td class="td-name">${a.account_name}</td>
      <td>${a.auto_sync_enabled ? '<span class="badge good" style="font-size:10px">✓ ON</span>' : '<span class="badge none" style="font-size:10px">⏸ OFF</span>'}</td>
      <td>${schedulerStateBadge(a.scheduler_state)}</td>
      <td class="td-muted">${a.queue_position ? `${a.queue_position}/${a.queue_size}` : '—'}</td>
      <td class="td-muted">${a.current_sync_tier || '—'}</td>
      <td class="td-muted" style="font-size:11px">${fmtWhen(a.last_successful_sync_at)}</td>
      <td class="${a.last_failed_sync_at ? 'text-red' : 'td-muted'}" style="font-size:11px">${fmtWhen(a.last_failed_sync_at)}</td>
      <td class="td-muted" style="font-size:11px">${a.cooldown_resumes_at ? fmtWhen(a.cooldown_resumes_at) : '—'}</td>
      <td class="td-muted" style="font-size:11px">${typeof a.next_scheduled_sync_at === 'string' && a.next_scheduled_sync_at.startsWith('due') ? a.next_scheduled_sync_at : fmtWhen(a.next_scheduled_sync_at)}</td>
      <td title="${freshnessTitle}"><span class="badge ${staleCount === 0 ? 'excellent' : staleCount === fresh.length ? 'critical' : 'warning'}" style="font-size:10px">${fresh.length - staleCount}/${fresh.length} fresh</span></td>
    </tr>`;
}

async function toggleScheduler(currentlyRunning) {
  await apiPost(`/sync/scheduler/${currentlyRunning ? 'pause' : 'resume'}`, {});
  refreshSyncStatusCard();
}

// ── KPI helpers (inline — mirrors src/services/kpiProfileResolver.js's
// primaryKPI/primaryCostKPI per objective; kept in sync manually since this
// is a static frontend file with no build step to import the backend
// module directly, but the objective keys/labels here must match the
// resolver's PROFILES exactly. 'engagement' replaces the old 'messaging'
// key (Meta's OUTCOME_ENGAGEMENT taxonomy -- see schema.phase8.js) and
// 'app_promotion' is new -- both objectives are real values campaigns.
// objective can now hold; leaving them out silently fell back to the
// generic Spend/CPM card, which is what real 'engagement' campaigns were
// doing until this fix. ──
const _KPI = {
  engagement:    { key:'results',            label:'Conversations',      costKey:'cpr',  costLabel:'Cost/Conv' },
  leads:         { key:'leads',              label:'Leads',              costKey:'cpl',  costLabel:'Cost/Lead' },
  sales:         { key:'roas',               label:'ROAS',               costKey:'cpa',  costLabel:'CPA' },
  traffic:       { key:'landing_page_views', label:'Landing Page Views', costKey:'cost_per_landing_page_view', costLabel:'Cost/LPV' },
  awareness:     { key:'reach',              label:'Reach',              costKey:'cpm',  costLabel:'CPM' },
  app_promotion: { key:'app_installs',       label:'App Installs',       costKey:'cpi',  costLabel:'Cost/Install' },
  unknown:       { key:'spend',              label:'Spend',              costKey:'cpm',  costLabel:'CPM' },
};
function icKPI(obj) { return _KPI[obj] || _KPI.unknown; }

// ── Meta lifecycle (mirrors src/services/metaLifecycle.js's LIFECYCLE map --
// kept in sync manually, same static-file-no-build-step reasoning as _KPI
// above). Never infers delivery state from spend/impressions -- only from
// the real effective_status Meta returned via sync. ──
const _LIFECYCLE = {
  ACTIVE:               { label:'Active',               isDelivering:true  },
  PAUSED:               { label:'Paused',                isDelivering:false },
  CAMPAIGN_PAUSED:      { label:'Campaign Paused',        isDelivering:false },
  ADSET_PAUSED:         { label:'Ad Set Paused',          isDelivering:false },
  ARCHIVED:             { label:'Archived',               isDelivering:false },
  DELETED:              { label:'Deleted',                isDelivering:false },
  IN_PROCESS:           { label:'In Process',             isDelivering:false },
  WITH_ISSUES:          { label:'With Issues',            isDelivering:false },
  DISAPPROVED:          { label:'Disapproved',            isDelivering:false },
  PENDING_REVIEW:       { label:'Pending Review',         isDelivering:false },
  PREAPPROVED:          { label:'Preapproved',            isDelivering:false },
  PENDING_BILLING_INFO: { label:'Pending Billing Info',   isDelivering:false },
  ACCOUNT_DISABLED:     { label:'Account Disabled',       isDelivering:false },
};
function lifecycleInfo(entity) {
  const code = (entity?.effective_status || entity?.status || '').toUpperCase().trim();
  return { code, ...( _LIFECYCLE[code] || { label: entity?.status || 'Unknown', isDelivering: code === 'ACTIVE' } ) };
}
// Renders the REAL Meta delivery state -- prefers effective_status over the
// coarser status the rest of the UI historically showed, so a campaign
// whose ad set is really CAMPAIGN_PAUSED never displays as plain "active".
function lifecycleChip(entity) {
  const info = lifecycleInfo(entity);
  const cls = info.isDelivering ? 'active' : (info.code === 'PAUSED' ? 'paused' : '');
  const style = cls ? '' : 'style="background:var(--bg3);color:var(--muted)"';
  return `<span class="chip ${cls}" ${style}>${info.label}</span>`;
}
function icScoreStyle(s) {
  if (s===null||s===undefined) return 'color:var(--muted);border-color:var(--border)';
  if (s>=80) return 'color:var(--green);border-color:var(--green)';
  if (s>=60) return 'color:var(--yellow);border-color:var(--yellow)';
  if (s>=40) return 'color:var(--orange);border-color:var(--orange)';
  return 'color:var(--red);border-color:var(--red)';
}
function icScoreEl(s) {
  const v = s!==null&&s!==undefined ? s : '—';
  return `<div class="ic-score-sm" style="${icScoreStyle(s)}">${v}</div>`;
}
function icFmtVal(key, val, currency='') {
  if (val===null||val===undefined) return '<span style="color:var(--muted);font-style:italic">No data</span>';
  const v = parseFloat(val);
  if (isNaN(v)) return '<span style="color:var(--muted);font-style:italic">No data</span>';
  if (key==='roas') return v.toFixed(2)+'x';
  if (key==='ctr')  return v.toFixed(2)+'%';
  if (['cpr','cpl','cpa','cpm','cpc','cost_per_landing_page_view','cpi','cost_per_thruplay','cost_per_engagement'].includes(key))
    return v.toFixed(2) + (currency?' '+currency:'');
  if (['results','leads','purchases','landing_page_views','reach','impressions','app_installs','thruplays','video_plays','post_engagements','page_engagements'].includes(key))
    return v.toLocaleString('en-US');
  if (key==='video_retention_rate')
    return v.toFixed(1)+'%';
  if (key==='spend' || key==='purchase_value')
    return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) + (currency?' '+currency:'');
  return v.toFixed(2);
}
function icDelta(deltas, key, lowerBetter=false) {
  const d = deltas?.[key];
  if (!d) return '';
  const pct = d.delta_pct;
  const good = lowerBetter ? pct < 0 : pct > 0;
  const cls  = good ? 'var(--green)' : 'var(--red)';
  const arr  = pct > 0 ? '▲' : pct < 0 ? '▼' : '▸';
  return `<span style="color:${cls};font-size:10px;margin-left:3px">${arr}${Math.abs(pct)}%</span>`;
}

// ── Health Score trend display (Phase 7B — Part 4) ──
// Reads health_trend[] already returned by backend (campaign/adset/ad insights).
// Shows previous score + delta + which underlying metrics moved, or "First analysis".
function buildHealthTrendHtml(trendArr, currentScore) {
  if (!Array.isArray(trendArr) || trendArr.length < 2) {
    return `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">📈 First analysis — no previous score to compare</div>`;
  }
  // trendArr is ordered ASC by calculated_at in the backend; last = current, second-to-last = previous
  const sorted = [...trendArr].sort((a,b) => new Date(a.calculated_at) - new Date(b.calculated_at));
  const prev = sorted[sorted.length - 2];
  const cur  = currentScore ?? sorted[sorted.length - 1]?.score;
  if (!prev || cur === undefined || cur === null) {
    return `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">📈 First analysis — no previous score to compare</div>`;
  }
  const diff = cur - prev.score;
  const cls  = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--muted)';
  const arr  = diff > 0 ? '▲' : diff < 0 ? '▼' : '▸';
  return `<div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    <span>Previous: <strong style="color:var(--text)">${prev.score}</strong></span>
    <span style="color:${cls};font-weight:700">${arr} ${Math.abs(diff)}</span>
    <span style="opacity:.7">(${new Date(prev.calculated_at).toLocaleDateString()})</span>
  </div>`;
}

// ── Main loader ──
async function loadCampaigns() {
  document.getElementById('content').innerHTML = '<div class="loader"><span class="spin">◌</span> Loading campaigns...</div>';
  const [campsR, histR] = await Promise.all([
    apiDate('/campaigns?limit=200'),
    apiDate('/health-history'),
  ]);
  window.ic.campaigns = campsR.data || [];
  window.ic.scoreMap  = {};
  (histR.data || []).forEach(h => { window.ic.scoreMap[h.entity_meta_id] = h; });

  // Always default to first campaign if none selected
  if (!window.ic.selectedCampaign && window.ic.campaigns.length) {
    window.ic.selectedCampaign = window.ic.campaigns[0];
  }

  // IMPORTANT: Always clear insights so date changes take effect
  window.ic.insights = null;
  window.ic.adsets   = [];
  window.ic.ads      = [];

  renderIC();
}

// ── Breadcrumb ──
function buildBreadcrumb() {
  const parts = [];
  const c = window.ic.selectedCampaign;
  if (c) parts.push(`<span class="bc-item" onclick="icSetLevel('campaign')">${c.name.length>30?c.name.slice(0,30)+'…':c.name}</span>`);
  if (window.ic.level === 'adsets') parts.push('<span class="bc-sep">›</span><span class="bc-current">Ad Sets</span>');
  if (window.ic.level === 'ads' && window.ic.selectedAdSet) {
    parts.push(`<span class="bc-sep">›</span><span class="bc-item" onclick="icSetLevel('adsets')">Ad Sets</span>`);
    parts.push(`<span class="bc-sep">›</span><span class="bc-current">${window.ic.selectedAdSet.name.length>25?window.ic.selectedAdSet.name.slice(0,25)+'…':window.ic.selectedAdSet.name}</span>`);
  }
  if (window.ic.level === 'ads' && !window.ic.selectedAdSet) parts.push('<span class="bc-sep">›</span><span class="bc-current">All Ads</span>');
  return parts.join(' ');
}

// ── Campaign selector change ──
async function icSelectCampaign(metaId) {
  window.ic.selectedCampaign = window.ic.campaigns.find(c => c.meta_campaign_id === metaId) || null;
  window.ic.selectedAdSet    = null;
  window.ic.level            = 'campaign';
  window.ic.insights         = null;  // force re-fetch
  window.ic.adsets           = [];    // clear adsets cache
  window.ic.ads              = [];    // clear ads cache
  window.ic.diagnosis        = null;  // clear diagnosis cache
  renderIC();
}

// ── Set level tab ──
function icSetLevel(level) {
  if (level === 'ads' && !window.ic.selectedAdSet) {
    window.ic.level = 'adsets';
    renderIC(); return;
  }
  // Clear cached data for this level so it re-fetches fresh
  if (level === 'adsets') window.ic.adsets = [];
  if (level === 'ads')    window.ic.ads    = [];
  if (level === 'campaign') window.ic.insights = null;
  if (level === 'diagnosis') window.ic.diagnosis = null;
  window.ic.level = level;
  renderIC();
}

// ── Analyze current campaign (refreshes ONLY this entity, no full page reload) ──
async function icAnalyze() {
  const c = window.ic.selectedCampaign;
  if (!c) return;
  const btn = document.getElementById('ic-analyze-btn');
  if (btn) { if (btn.disabled) return; btn.textContent = '⏳ Analyzing...'; btn.disabled = true; }
  try {
    const r = await api(addDateQ(insightsUrl(`/campaigns/${c.id}/insights`)));
    window.ic.insights = r;
    // Phase 8: only update the score map when Meta actually returned data —
    // an analyzed:false response must not overwrite a previously valid score.
    if (r.analyzed !== false) {
      window.ic.scoreMap[c.meta_campaign_id] = { health_score: r.health_score, health_status: r.health_status, calculated_at: r.fetched_at };
    }
    // Refresh only the header score pill + current level content (not the whole shell)
    const scorePill = document.querySelector('.ic-topbar .hs-inline, .ic-topbar .badge');
    if (window.ic.level === 'campaign') {
      const el = document.getElementById('ic-level-content');
      if (el) await icLoadCampaignView(el);
    }
    // Update header inline (score + KPI pills) without full re-render
    icRefreshHeaderOnly();
  } catch(e) {
    console.warn('[icAnalyze] failed:', e.message);
  } finally {
    const b = document.getElementById('ic-analyze-btn');
    if (b) { b.textContent = '⚡ Analyze'; b.disabled = false; }
  }
}

// ── Refresh only the compressed header bar (score + KPI pills) without rebuilding tabs/content ──
function icRefreshHeaderOnly() {
  const c = window.ic.selectedCampaign;
  if (!c) return;
  const h = window.ic.scoreMap[c.meta_campaign_id];
  const topbar = document.querySelector('.ic-topbar');
  if (!topbar) return;
  // Update score circle + status badge in place
  const scoreEl = topbar.querySelector('.ic-score-sm');
  if (scoreEl) {
    scoreEl.textContent = h?.health_score ?? '—';
    scoreEl.style.cssText = icScoreStyle(h?.health_score ?? null);
  }
  const badgeEl = topbar.querySelector('.badge');
  if (badgeEl) {
    badgeEl.className = `badge ${h?.health_status||'none'}`;
    badgeEl.textContent = fmtHealthStatus(h?.health_status);
  }
}

// ── Load content for current level ──
async function icLoadLevel() {
  const el = document.getElementById('ic-level-content');
  if (!el) return;

  if (window.ic.level === 'campaign')  { await icLoadCampaignView(el);  return; }
  if (window.ic.level === 'adsets')    { await icLoadAdSetsView(el);    return; }
  if (window.ic.level === 'ads')       { await icLoadAdsView(el);       return; }
  if (window.ic.level === 'diagnosis') { await icLoadDiagnosisView(el); return; }
}

// ── DIAGNOSIS (Phase 9 — rule-based "why did this move") ──
function icDiagBadgeClass(kind, val) {
  if (kind === 'priority') {
    return { critical:'critical', high:'warning', medium:'good', low:'none', observation_only:'none' }[val] || 'none';
  }
  // confidence
  return { high:'excellent', medium:'good', low:'none' }[val] || 'none';
}

// ── Executive Diagnosis Card (Phase X.5) ──
// Renders `dg.findings` (server-shaped by decisionEngine.findingShapeForCard()
// -- see insights.js's diagnosis route) as one card per finding, each with
// all 11 requested fields sourced from runtime data. `decision_history_id`
// (present only when this finding has already reached the Decision Center)
// is what makes Next Action interactive -- when absent, the finding is
// reported honestly as not yet tracked rather than showing a dead button.
function icNextActionCell(f) {
  if (!f.decision_history_id) {
    return '<span class="text-muted" style="font-size:11px">Not yet tracked in Decision Center</span>';
  }
  if (f.next_action_taken || f.next_action_status === 'completed') {
    return '<span class="badge good">✓ Completed</span>';
  }
  if (f.next_action_status === 'dismissed') {
    return '<span class="badge none">Dismissed</span>';
  }
  const label = (f.decision_label || f.decision_type || '').replace(/'/g, "\\'");
  return `
    <button class="btn btn-success btn-sm" onclick="icCompleteFinding('${f.decision_history_id}','${label}')">✓ Mark Done</button>
    <button class="btn btn-danger btn-sm" onclick="icDismissFinding('${f.decision_history_id}')">Dismiss</button>
  `;
}

async function icCompleteFinding(decisionHistoryId, label) {
  openModal(`
  <h3>✓ Mark Complete</h3>
  <p class="text-muted" style="font-size:13px;margin-bottom:14px">What action did you take for "${label}"?</p>
  <div class="form-group">
    <label class="form-label">Action Notes (optional)</label>
    <textarea class="form-input" id="ic-finding-note"></textarea>
  </div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="icSaveFindingComplete('${decisionHistoryId}')">Mark Complete</button>
  </div>`);
}

async function icSaveFindingComplete(decisionHistoryId) {
  const notes = document.getElementById('ic-finding-note')?.value || '';
  try { await apiPatch('/decisions/history/' + decisionHistoryId, { status: 'completed', action_notes: notes, action_taken: true }); } catch {}
  closeModal();
  window.ic.diagnosis = null; // force refetch -- the cached response is now stale
  icLoadLevel();
}

async function icDismissFinding(decisionHistoryId) {
  try { await apiPatch('/decisions/history/' + decisionHistoryId, { status: 'dismissed' }); } catch {}
  window.ic.diagnosis = null;
  icLoadLevel();
}

function icExecutiveFindingCard(f) {
  const priorityCls = icDiagBadgeClass('priority', f.priority);
  const confidenceCls = icDiagBadgeClass('confidence', f.confidence);
  const evidenceText = f.evidence
    ? (Array.isArray(f.evidence)
        ? f.evidence.map(e => `${e.metric||''} ${e.operator||''} ${e.threshold??''} (actual: ${e.actual??'—'})`).join(' · ')
        : `${f.evidence.metric||''} actual: ${f.evidence.actual ?? f.evidence.detected_value ?? '—'}, threshold: ${f.evidence.threshold ?? f.evidence.threshold_value ?? '—'}`)
    : '—';

  return `
  <div class="card" style="margin-bottom:12px;border-left:3px solid ${f.governance_state==='failed' ? 'var(--red)' : 'var(--accent2)'}">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <span class="chip" style="background:var(--bg3)">${f.source}</span>
        <span style="font-size:13px;font-weight:600;margin-left:6px">${f.decision_label || f.decision_type || 'Decision: —'}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="badge ${priorityCls}">${(f.priority||'—').replace('_',' ')}</span>
        <span class="badge ${confidenceCls}">${f.confidence || '—'} confidence</span>
        ${f.governance_state ? icGovernanceStateBadge(f.governance_state) : ''}
      </div>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--muted)">
      Framework: <strong style="color:var(--text)">${f.framework_name || f.framework || '—'}</strong>
      ${f.category ? ` · Root cause category: <strong style="color:var(--text);text-transform:capitalize">${f.category}</strong>` : ''}
    </div>
    <div style="margin-top:8px;font-size:12px;padding:8px;background:var(--bg3);border-radius:6px">💡 <strong>Recommendation:</strong> ${f.suggested_action || '—'}</div>
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">📊 <strong>Evidence:</strong> ${evidenceText}</div>
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">🎯 <strong>Expected Impact:</strong> ${f.expected_impact || 'Not yet projected — this finding hasn\'t reached the Decision Center\'s history yet'}</div>
    ${f.historical_note ? `
    <div style="margin-top:6px;font-size:11px;color:var(--orange)">🧠 <strong>Memory:</strong> ${f.historical_note}</div>
    ` : (f.historical_effectiveness && f.historical_effectiveness.attempts > 0 ? `
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">🧠 <strong>Memory:</strong> Tried ${f.historical_effectiveness.attempts} time(s) before — ${f.historical_effectiveness.improved} improved, ${f.historical_effectiveness.worsened} worsened, ${f.historical_effectiveness.no_change} no change.</div>
    ` : '')}
    <div style="margin-top:8px;display:flex;gap:6px;align-items:center">
      <span style="font-size:11px;color:var(--muted)">Next Action:</span> ${icNextActionCell(f)}
    </div>
  </div>`;
}

function icExecutiveDiagnosisFindings(findings) {
  if (!findings || !findings.length) {
    return `<div class="empty">No Decision, Recommendation, or Alert has been generated for this finding yet.</div>`;
  }
  return findings.map(icExecutiveFindingCard).join('');
}

    </div>

    ${icExecutiveSummaryCard(dg.executive_summary)}

    <!-- Dashboard Normalization (Phase 46) -- decision-bearing content moved

async function icLoadAdSetsView(el) {
  const c = window.ic.selectedCampaign;
  el.innerHTML = '<div class="loader"><span class="spin">◌</span> Loading ad sets...</div>';
  let data = [];
  try {
    const acctQ = window._accountId ? '&account_id='+window._accountId : '';
    const r = await api(`/adsets?campaign_id=${c.meta_campaign_id}&limit=100${acctQ}`);
    data = r.data || [];
    window.ic.adsets = data;
  } catch(e) { el.innerHTML = '<div class="ic-empty">⚠ Could not load ad sets<br><span style="font-size:11px;opacity:.7">Check your connection and try again</span></div>'; return; }

  if (!data.length) { el.innerHTML = '<div class="ic-empty">📦 No Ad Sets Available<br><span style="font-size:11px;opacity:.7">This campaign has no ad sets in the system</span></div>'; return; }

  const kpi = icKPI(c.objective);
  const curr = ins => ins?.metrics ? ins.metrics : {};

  // Fetch adset insights in parallel (mock)
  const insightMap = {};
  await Promise.allSettled(data.map(async s => {
    try {
      const r = await api(addDateQ(insightsUrl(`/adsets/${s.meta_adset_id}/insights`)));
      insightMap[s.meta_adset_id] = r;
    } catch {}
  }));

  window.ic._adSetInsightMap = insightMap;
  window.ic._adSetKpi = kpi;

  const goals = [...new Set(data.map(s => s.optimization_goal).filter(Boolean))];

  el.innerHTML = `
    ${goals.length > 1 ? `
    <div class="filter-bar" style="margin-bottom:8px">
      <select onchange="icFilterAdSetsByGoal(this.value)" id="ic-adset-goal-filter">
        <option value="">All Optimization Goals</option>
        ${goals.map(g => `<option value="${g}">${g}</option>`).join('')}
      </select>
    </div>` : ''}
    <div id="ic-adset-rows">${icRenderAdSetRows(data, kpi, insightMap)}</div>
  `;
}

function icRenderAdSetRows(data, kpi, insightMap) {
  return `
    <div class="ic-col-label ic-adset-label">
      <span>Ad Set</span><span>Delivery</span><span>Health</span><span>Audience</span>
      <span>Results (${kpi.label})</span><span>Cost (${kpi.costLabel})</span><span>CTR</span><span>Freq</span><span>Spend</span><span></span>
    </div>
    ${data.map(s => {
      const ins = insightMap[s.meta_adset_id];
      const m   = ins?.metrics || {};
      // FIX 6 (Phase 9): Health score from stored DB (s.health_score) always shows,
      // regardless of whether the live insight call succeeded.
      // Stored score comes from last successful Analyze run in health_score_history.
      const hs  = (ins && ins.analyzed !== false) ? ins.health_score : s.health_score;
      const hasLiveMetrics = ins && ins.analyzed !== false && Object.keys(m).length > 0;
      const noInsightsReason = ins?.reason || 'No Meta insights for this period';
      return `<div class="ic-adset-row">
        <div>
          <div class="ic-cell-name">${s.name}</div>
          <div style="margin-top:2px;display:flex;gap:4px;align-items:center">${objChip(s.objective)}${s.optimization_goal ? `<span class="chip" style="font-size:9px;text-transform:none" title="Optimization Goal">${s.optimization_goal}</span>` : ''}</div>
        </div>
        <div style="font-size:10px">${lifecycleChip(s)}</div>
        <div style="display:flex;align-items:center;gap:5px">${icScoreEl(hs)}</div>
        <div class="ic-cell-muted" style="font-size:11px">${s.targeting_summary || '—'}</div>
        <div class="ic-cell-muted">${hasLiveMetrics ? icFmtVal(kpi.key, m[kpi.key]) : '<span style="font-style:italic;opacity:.5;font-size:10px">Click ⚡</span>'}</div>
        <div class="ic-cell-muted">${hasLiveMetrics ? icFmtVal(kpi.costKey, m[kpi.costKey]) : '—'}</div>
        <div class="ic-cell-muted">${hasLiveMetrics ? icFmtVal('ctr', m.ctr) : '—'}</div>
        <div class="ic-cell-muted">${hasLiveMetrics ? icFmtVal('frequency', m.frequency) : '—'}</div>
        <div class="ic-cell-muted">${hasLiveMetrics ? icFmtVal('spend', m.spend) : '—'}</div>
        <div style="display:flex;gap:5px">
          <button class="ic-drill-btn" onclick="icDrillToAds('${s.meta_adset_id}','${s.name.replace(/'/g,"\'")}')">View Ads →</button>
          <button class="ic-analyze-btn" onclick="icAnalyzeAdSet('${s.meta_adset_id}','${s.name.replace(/'/g,"\'")}',this)">⚡</button>
        </div>
      </div>`;
    }).join('')}
  `;
}

function icFilterAdSetsByGoal(goal) {
  const all = window.ic.adsets || [];
  const filtered = goal ? all.filter(s => s.optimization_goal === goal) : all;
  document.getElementById('ic-adset-rows').innerHTML =
    icRenderAdSetRows(filtered, window.ic._adSetKpi, window.ic._adSetInsightMap || {});
}

// ── Ad set analyze ──
async function icAnalyzeAdSet(metaAdSetId, name, btnEl) {
  if (btnEl) { if (btnEl.disabled) return; btnEl.textContent = '⏳'; btnEl.disabled = true; }
  try {
    await api(addDateQ(insightsUrl(`/adsets/${metaAdSetId}/insights`)));
    // Refresh the whole ad sets view (table needs updated row data)
    const el = document.getElementById('ic-level-content');
    if (el) await icLoadAdSetsView(el);
  } catch(e) {
    console.warn('[icAnalyzeAdSet] failed:', e.message);
    if (btnEl) { btnEl.textContent = '⚡'; btnEl.disabled = false; }
  }
}

// ── Ad analyze ──
async function icAnalyzeAd(metaAdId, name, btnEl) {
  if (btnEl) { if (btnEl.disabled) return; btnEl.textContent = '⏳'; btnEl.disabled = true; }
  try {
    const r = await api(addDateQ(insightsUrl(`/ads/${metaAdId}/insights`)));
    // Phase 8: honor analyzed:false instead of rendering a modal of fabricated/empty tiles
    if (r.analyzed === false) {
      openModal(`
        <h3>${name}</h3>
        <div class="ic-empty" style="padding:20px 0">⚠ ${r.reason || 'No Meta insights available for the selected period'}</div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
      `);
      return;
    }
    // Show a quick modal with ad insights
    openModal(`
      <h3>${name}</h3>
      <div class="details-grid" style="margin-top:12px">
        ${Object.entries(r.metrics||{}).filter(([k,v])=>v!==null&&typeof v==='number').slice(0,8).map(([k,v])=>`
          <div class="detail-item">
            <div class="detail-label" style="font-size:10px">${k.toUpperCase()}</div>
            <div class="detail-value small">${typeof v==='number'?v.toFixed(2):v}</div>
          </div>`).join('')}
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:8px">
        ${icScoreEl(r.health_score)} <span class="badge ${r.health_status||'none'}">${r.health_status||'—'}</span>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
    `);
  } catch(e) {
    console.warn('[icAnalyzeAd] failed:', e.message);
  } finally {
    if (btnEl) { btnEl.textContent = '⚡'; btnEl.disabled = false; }
  }
}

async function viewCampaign(metaCampaignId) {
  // Route to Intelligence Center
  if (!window.ic.campaigns.length) {

    window.ic.campaigns = r.data || [];
  }
  const camp = window.ic.campaigns.find(c => c.meta_campaign_id === metaCampaignId);

function showTab(name, el) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = '';
  el.classList.add('active');

  if (!el) return;

  el.innerHTML = renderHistoryChart(hist.data, 'Health Score Trend (Last 30 Days)');
}

function renderHistoryChart(data, title) {
  if (!data?.length) return '<div class="empty">No data</div>';
  const max = 100;
  const bars = data.map(d => {
    const cls = scoreClass(d.health_score);
    const colorMap = { excellent:'var(--green)', good:'var(--yellow)', warning:'var(--orange)', critical:'var(--red)', none:'var(--muted)' };
    const h = Math.round((d.health_score / max) * 80);
    const dt = new Date(d.calculated_at);
    const lbl = `${dt.getMonth()+1}/${dt.getDate()}`;
    return `<div class="bar-wrap" title="${d.health_score} on ${dt.toLocaleDateString()}">
      <div class="bar" style="height:${h}px;background:${colorMap[cls]||'var(--muted)'}"></div>
      <div class="bar-label">${lbl}</div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="section-title" style="margin-bottom:16px">${title}</div>
    <div class="chart-wrap">
      <div class="chart-bars">${bars}</div>
    </div>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--muted)">Min: ${Math.min(...data.map(d=>d.health_score))}</span>
      <span style="font-size:11px;color:var(--muted)">Max: ${Math.max(...data.map(d=>d.health_score))}</span>
      <span style="font-size:11px;color:var(--muted)">Latest: ${data[data.length-1]?.health_score}</span>
      <span style="font-size:11px;color:var(--muted)">${data.length} data points</span>
    </div>
  </div>`;
}

  document.getElementById('content').innerHTML = `
  <div class="filter-bar">
    <select onchange="filterRecs()" id="rf-severity">

    </select>
    <select onchange="filterRecs()" id="rf-status">

    </select>

function renderFullRecList(data, campMap) {
  if (!data.length) return '<div class="empty">No recommendations found.</div>';
  return data.map(r => `
  <div class="rec-card ${r.severity}" id="rec-${r.id}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div>
        <div class="rec-title">${r.recommendation_title}</div>
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center">
          <span class="badge ${r.severity}">${r.severity}</span>
          ${r.campaign_name ? `<span class="text-muted" style="font-size:12px">${r.campaign_name}</span>` : ''}
          ${r.objective ? objChip(r.objective) : ''}
          ${r.governance_state ? icGovernanceStateBadge(r.governance_state) : ''}
        </div>
      </div>
      ${r.action_taken ? '<span class="badge good">✓ Done</span>' : ''}
    </div>
    <div class="rec-body mt8">${r.recommendation_body}</div>
    <div class="rec-meta">
      <span class="text-muted" style="font-size:11px">Generated: ${fmtDate(r.generated_at)}</span>
      <span class="text-muted" style="font-size:11px">Code: ${r.rule_code}</span>
    </div>
    ${r.action_notes ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;padding:8px;background:var(--bg3);border-radius:6px">Note: ${r.action_notes}</div>` : ''}
    <div class="rec-actions">
      ${!r.action_taken ? `<button class="btn btn-success btn-sm" onclick="markRecDone('${r.id}',true)">✓ Mark Done</button>` : `<button class="btn btn-ghost btn-sm" onclick="markRecDone('${r.id}',false)">↩ Undo</button>`}
      <button class="btn btn-ghost btn-sm" onclick="addRecNote('${r.id}')">📝 Add Note</button>
      ${!r.dismissed_at ? `<button class="btn btn-danger btn-sm" onclick="dismissRec('${r.id}')">Dismiss</button>` : ''}
    </div>
  </div>`).join('');
}

function filterRecs() {
  const sev  = document.getElementById('rf-severity').value;
  const stat = document.getElementById('rf-status').value;
  const camp = document.getElementById('rf-campaign').value;
  const obj  = document.getElementById('rf-objective').value;
  let filtered = window._allRecs || [];
  if (sev)  filtered = filtered.filter(r => r.severity === sev);
  if (stat === 'completed') filtered = filtered.filter(r => r.action_taken);
  else if (stat === 'dismissed') filtered = filtered.filter(r => r.dismissed_at);
  else filtered = filtered.filter(r => !r.dismissed_at);
  if (camp) filtered = filtered.filter(r => r.entity_meta_id === camp);
  if (obj)  filtered = filtered.filter(r => r.objective === obj);
  document.getElementById('rec-list').innerHTML = renderFullRecList(filtered, window._campMap || {});
}

async function markRecDone(id, done=true) {
  await apiPatch(`/recommendations/${id}`, { action_taken: done });
  loadRecommendations();

async function dismissRec(id) {

  const note = document.getElementById('note-text').value;
  await apiPatch(`/recommendations/${id}`, { action_notes: note, action_taken: true });
  closeModal();
  loadRecommendations();
}

function renderAlertsTable(data) {
  if (!data.length) return '<div class="empty" style="padding:40px">No alerts found.</div>';
  return `<table>
    <thead><tr>
      <th>Severity</th><th>Campaign</th><th>Objective</th><th>Message</th><th>Alert</th>
      <th>Occurrences</th><th>First Detected</th><th>Last Detected</th><th>Governance</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${data.map(a=>`
    <tr class="alert-row ${a.severity}">
      <td><span class="badge ${a.severity}">${a.severity}</span></td>
      <td class="td-name">${a.campaign_name||a.entity_label||'—'}</td>
      <td>${a.objective ? objChip(a.objective) : '—'}</td>
      <td class="td-muted" style="max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.alert_message||'—'}</td>
      <td><code style="font-size:11px;background:var(--bg3);padding:2px 6px;border-radius:4px">${a.alert_code}</code></td>
      <td>${a.occurrence_count||1}×</td>

      <td class="td-muted">${fmtDate(a.last_detected_at)}</td>
      <td>${a.governance_state ? icGovernanceStateBadge(a.governance_state) : '<span class="text-muted" style="font-size:11px">—</span>'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="snoozeAlert('${a.id}')">Snooze</button>
        <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="dismissAlert('${a.id}')">Dismiss</button>
      </td>
    </tr>`).join('')}

function filterAlerts() {
  const sev  = document.getElementById('af-severity').value;
  const stat = document.getElementById('af-status').value;
  const obj  = document.getElementById('af-objective').value;
  let filtered = window._allAlerts || [];
  if (sev) filtered = filtered.filter(a => a.severity === sev);
  if (stat === 'snoozed') filtered = filtered.filter(a => a.snoozed_until && new Date(a.snoozed_until) > new Date());
  else if (stat === 'resolved') filtered = filtered.filter(a => a.status === 'resolved');
  else if (stat === 'dismissed') filtered = filtered.filter(a => a.status === 'dismissed');
  else filtered = filtered.filter(a => a.status === 'active' && (!a.snoozed_until || new Date(a.snoozed_until) < new Date()));
  if (obj) filtered = filtered.filter(a => a.objective === obj);
  document.getElementById('alerts-table').innerHTML = renderAlertsTable(filtered);
}

  const msg = document.getElementById('autosync-save-msg');
  msg.textContent = 'Saved ✓';

}

}

function syncStatusColor(status) {
  if (status === 'running')  return 'var(--blue)';
  if (status === 'success')  return 'var(--green)';
  if (status === 'failed')   return 'var(--red)';
  return 'var(--muted)';
}

function renderAccountCard(a, sched) {
  const syncStatus = a.last_sync_status || 'idle';
  // Sync Health: a simple, honest rollup -- never delivering (token invalid),
  // last attempt failed, stale (past its own interval with no success), or healthy.
  let health = { cls: 'excellent', label: '✓ Healthy' };
  if (!a.token_is_valid) health = { cls: 'critical', label: '⚠ Token Invalid' };
  else if (syncStatus === 'failed') health = { cls: 'critical', label: '⛔ Last Sync Failed' };
  else if (syncStatus === 'running') health = { cls: 'warning', label: '● Syncing' };
  else if (a.auto_sync_enabled && sched && sched.freshness && sched.freshness.some(f => f.is_stale)) health = { cls: 'warning', label: '⏳ Stale' };
  else if (!a.auto_sync_enabled) health = { cls: 'none', label: '⏸ Auto Sync Off' };

  const nextSync = sched && sched.next_scheduled_sync_at
    ? (sched.next_scheduled_sync_at.startsWith('due') ? sched.next_scheduled_sync_at : fmtWhen(sched.next_scheduled_sync_at))
    : '—';

  return `
    <div class="card" style="margin-bottom:12px" id="acct-card-${a.id}">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-weight:600;font-size:15px">${a.account_name}</div>
          <div class="text-muted" style="font-size:12px;margin-top:3px">
            ID: ${a.meta_account_id} · ${a.currency} · ${a.timezone}
          </div>
          ${a.business_name ? `<div class="text-muted" style="font-size:12px">Business: ${a.business_name}</div>` : ''}
          ${a.client_label ? `<div class="text-muted" style="font-size:12px">Label: ${a.client_label}</div>` : ''}
          ${a.notes ? `<div class="text-muted" style="font-size:12px">Notes: ${a.notes}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="badge ${a.token_is_valid?'good':'critical'}">${a.token_is_valid?'✓ Token Valid':'⚠ Token Invalid'}</span>
          <span class="chip ${a.status==='active'||a.status==='paused'?a.status:''}" ${a.status!=='active'&&a.status!=='paused'?`style="background:var(--bg3);color:var(--muted)"`:''}>${a.status}</span>
          ${a.auto_sync_enabled ? '<span class="badge good">✓ Auto Sync Enabled</span>' : '<span class="badge none">⏸ Auto Sync Disabled</span>'}
        </div>
      </div>
      <hr class="divider">
      <div class="grid grid-3" style="font-size:12px;color:var(--muted)">
        <div>Attribution Window: <strong style="color:var(--text)">${a.attribution_window_days} days</strong></div>
        <div>Country: <strong style="color:var(--text)">${a.country_code||'—'}</strong></div>
        <div>Last Verified: <strong style="color:var(--text)">${fmtDate(a.last_token_verified_at)}</strong></div>
      </div>
      <div class="grid grid-3" style="font-size:12px;color:var(--muted);margin-top:8px">
        <div>Last Sync: <strong style="color:var(--text)">${fmtDate(a.last_sync_completed_at)}</strong></div>
        <div>Sync Status: <strong style="color:${syncStatusColor(syncStatus)}" id="acct-sync-status-${a.id}">${syncStatus}${a.sync_progress_phase?` (${a.sync_progress_phase})`:''}</strong></div>
        <div>Auto-Sync: <strong style="color:var(--text)">${a.auto_sync_enabled?`every ${a.auto_sync_interval_minutes}m`:'off'}</strong></div>
      </div>
      <div class="grid grid-3" style="font-size:12px;color:var(--muted);margin-top:8px">
        <div>Next Sync: <strong style="color:var(--text)">${nextSync}</strong></div>
        <div>Scheduler: ${sched ? schedulerStateBadge(sched.scheduler_state) : '<span class="text-muted">—</span>'}</div>
        <div>Sync Health: <span class="badge ${health.cls}" style="font-size:10px">${health.label}</span></div>
      </div>
      ${a.last_sync_error ? `<div class="text-red" style="font-size:11px;margin-top:6px">Last error: ${a.last_sync_error}</div>` : ''}
      <hr class="divider">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="openEditAccount('${a.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="openRefreshToken('${a.id}')">Refresh Token</button>
        <button class="btn btn-ghost btn-sm" onclick="testAccountConnection('${a.id}', this)">Test Connection</button>
        <button class="btn btn-ghost btn-sm" onclick="syncAccountNow('${a.id}', this)" title="Immediately syncs this account only — does not interrupt the background scheduler">Run Now (Force Sync)</button>
        ${a.auto_sync_enabled
          ? `<button class="btn btn-ghost btn-sm" onclick="toggleAccountAutoSync('${a.id}', false, this)">Disable Auto Sync</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="toggleAccountAutoSync('${a.id}', true, this)">Enable Auto Sync</button>`}
        ${a.status === 'active'
          ? `<button class="btn btn-ghost btn-sm" onclick="setAccountStatus('${a.id}','paused')">Disable</button>`
          : a.status === 'paused'
          ? `<button class="btn btn-ghost btn-sm" onclick="setAccountStatus('${a.id}','active')">Enable</button>`
          : `<button class="btn btn-ghost btn-sm" onclick="setAccountStatus('${a.id}','active')">Reconnect</button>`}
        <button class="btn btn-danger btn-sm" onclick="removeAccount('${a.id}')">Remove</button>
      </div>
    </div>
  `;
}
